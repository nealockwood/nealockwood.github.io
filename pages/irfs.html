<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Projection IRF Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #f4f6f3;
    --panel: #ffffff;
    --ink: #17201b;
    --muted: #66736c;
    --line: #d9dfd8;
    --teal: #167c80;
    --teal-soft: rgba(22, 124, 128, 0.14);
    --amber: #b66d12;
    --rose: #9a4055;
    --shadow: 0 16px 40px rgba(22, 32, 27, 0.08);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  .app {
    display: grid;
    grid-template-columns: minmax(300px, 370px) minmax(0, 1fr);
    gap: 18px;
    padding: 18px;
    min-height: 100vh;
  }

  aside, main {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }

  aside {
    border-radius: 8px;
    padding: 16px;
    overflow: auto;
    max-height: calc(100vh - 36px);
  }

  main {
    border-radius: 8px;
    display: grid;
    grid-template-rows: auto minmax(760px, 1fr) auto;
    min-width: 0;
  }

  .brand {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  h1 {
    margin: 0;
    font-size: 20px;
    line-height: 1.12;
    letter-spacing: 0;
  }

  .stamp {
    color: var(--muted);
    font-size: 12px;
    margin-top: 5px;
  }

  .section {
    border-top: 1px solid var(--line);
    padding-top: 13px;
    margin-top: 13px;
  }

  .section-title {
    font-size: 11px;
    line-height: 1;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #34443a;
    margin-bottom: 5px;
  }

  .unit-note {
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
  }

  select, input[type="number"], input[type="date"], input[type="text"] {
    width: 100%;
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fbfcfb;
    color: var(--ink);
    font-size: 13px;
    padding: 6px 9px;
    outline: none;
  }

  select:focus, input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 2px var(--teal-soft);
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
    color: #26352d;
    font-size: 13px;
  }

  .check-row input {
    width: 15px;
    height: 15px;
    accent-color: var(--teal);
    flex: 0 0 auto;
  }

  .check-row span {
    overflow-wrap: anywhere;
  }

  .exclude-year-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 30px;
  }

  .exclude-label {
    font-size: 12px;
    font-weight: 800;
    color: #34443a;
    min-width: 54px;
  }

  .exclude-year-row .check-row {
    margin-bottom: 0;
    min-height: 24px;
  }

  .control-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 10px;
    row-gap: 2px;
  }

  .control-group {
    border-top: 1px solid #edf0ed;
    padding-top: 9px;
    margin-top: 9px;
  }

  .control-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .control-group-header .check-row {
    margin-bottom: 0;
    min-height: 24px;
  }

  .control-group-title {
    font-size: 13px;
    font-weight: 850;
    color: #26352d;
  }

  .control-picker summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    list-style: none;
    margin-bottom: 7px;
  }

  .control-picker summary::-webkit-details-marker { display: none; }

  .control-picker summary::after {
    content: " +";
  }

  .control-picker[open] summary::after {
    content: " -";
  }

  button {
    border: 0;
    border-radius: 6px;
    min-height: 38px;
    padding: 9px 12px;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  button svg { width: 16px; height: 16px; }

  .primary {
    width: 100%;
    background: var(--teal);
    color: white;
  }

  .secondary {
    width: 100%;
    background: #eef2ef;
    color: #26352d;
  }

  .topbar {
    padding: 16px 18px 10px;
    border-bottom: 1px solid var(--line);
  }

  .topbar-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }

  .chart-title {
    font-size: 18px;
    font-weight: 850;
    margin-bottom: 4px;
  }

  .chart-subtitle {
    color: var(--muted);
    font-size: 13px;
  }

  .status {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .pill {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 8px;
    font-size: 12px;
    color: #34443a;
    background: #fbfcfb;
    white-space: nowrap;
  }

  .pill.warn {
    color: var(--rose);
    border-color: rgba(154, 64, 85, 0.32);
    background: rgba(154, 64, 85, 0.07);
  }

  .plot-controls {
    margin-top: 12px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  .view-tabs {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 7px;
    overflow: hidden;
    background: #fbfcfb;
  }

  .view-tab {
    min-height: 34px;
    border-radius: 0;
    padding: 7px 11px;
    background: transparent;
    color: #34443a;
    border-right: 1px solid var(--line);
  }

  .view-tab:last-child { border-right: 0; }

  .view-tab.active {
    background: var(--teal);
    color: white;
  }

  .top-dropdown {
    position: relative;
    min-width: 180px;
  }

  .top-dropdown summary {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fbfcfb;
    color: var(--ink);
    font-size: 13px;
    font-weight: 750;
    padding: 7px 10px;
    cursor: pointer;
    list-style: none;
  }

  .top-dropdown summary::-webkit-details-marker { display: none; }

  .top-dropdown summary::after {
    content: " ▾";
    color: var(--muted);
  }

  .dropdown-panel {
    position: absolute;
    z-index: 5;
    top: calc(100% + 6px);
    right: 0;
    width: min(520px, calc(100vw - 52px));
    max-height: 320px;
    overflow: auto;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 10px;
  }

  .dropdown-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .mini-action {
    min-height: 30px;
    padding: 6px 10px;
    background: #eef2ef;
    color: #26352d;
  }

  .horizon-list {
    display: grid;
    grid-template-columns: repeat(6, minmax(48px, 1fr));
    gap: 2px 8px;
  }

  #plot {
    width: 100%;
    min-height: 760px;
  }

  .diagnostics {
    border-top: 1px solid var(--line);
    padding: 12px 18px 16px;
    display: grid;
    grid-template-columns: repeat(5, minmax(120px, 1fr));
    gap: 10px;
  }

  .metric {
    background: #f8faf8;
    border: 1px solid #e8ede8;
    border-radius: 8px;
    padding: 9px 10px;
  }

  .metric .name {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .metric .value {
    font-size: 15px;
    font-weight: 850;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .error {
    margin: 18px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid rgba(154, 64, 85, 0.35);
    background: rgba(154, 64, 85, 0.08);
    color: #7e2f43;
    font-weight: 700;
  }

  .hidden { display: none; }

  @media (max-width: 940px) {
    .app {
      grid-template-columns: 1fr;
      padding: 10px;
    }
    aside {
      max-height: none;
    }
    main {
      min-height: 760px;
    }
    .topbar {
      display: block;
    }
    .topbar-head {
      display: block;
    }
    .status {
      justify-content: flex-start;
      margin-top: 10px;
    }
    .diagnostics {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div>
        <h1>Local Projection IRF Explorer</h1>
        <div class="stamp" id="data-stamp">Loading data...</div>
      </div>
    </div>

    <div class="section" style="border-top: 0; padding-top: 0; margin-top: 0;">
      <div class="section-title">Specification</div>
      <div>
        <label for="shock">Series</label>
        <select id="shock"></select>
      </div>
      <div style="margin-top: 10px;">
        <label for="aggregation">Aggregation</label>
        <select id="aggregation">
          <option value="main">main == 1</option>
          <option value="all">All event rows</option>
          <option value="month-sum">Monthly sum</option>
          <option value="month-last">Monthly last</option>
          <option value="month-first">Monthly first</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Filter</div>
      <div>
        <label for="included-years">Included years</label>
        <input id="included-years" type="text" value="1993-2025" placeholder="1993-2007, 2012, 2024+">
      </div>
      <div style="margin-top: 9px;">
        <label class="check-row"><input id="include-zlb" type="checkbox"><span>Include ZLB periods</span></label>
        <label class="check-row"><input id="include-covid" type="checkbox"><span>Include COVID</span></label>
        <div class="exclude-year-row">
          <span class="exclude-label">Exclude</span>
          <label class="check-row"><input class="exclude-year-check" type="checkbox" value="2008"><span>2008</span></label>
          <label class="check-row"><input class="exclude-year-check" type="checkbox" value="2009"><span>2009</span></label>
          <label class="check-row"><input class="exclude-year-check" type="checkbox" value="2010"><span>2010</span></label>
        </div>
        <label class="check-row"><input id="exclude-unscheduled" type="checkbox"><span>Exclude unscheduled meetings</span></label>
        <label class="check-row"><input id="impute-zeros" type="checkbox"><span>Impute missing months with zeros</span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Series, Outcome, Scaling</div>
      <div class="grid-2">
        <div>
          <label for="shock-lags">Series lags</label>
          <input id="shock-lags" type="number" min="0" max="60" step="1" value="12">
        </div>
        <div>
          <label for="dep-lags">Outcome lags</label>
          <input id="dep-lags" type="number" min="0" max="60" step="1" value="12">
        </div>
      </div>
      <div style="margin-top: 9px;">
        <label class="check-row"><input id="use-whitening" type="checkbox"><span>Whiten series residual</span></label>
      </div>
      <div id="whitening-lag-wrap" class="hidden" style="margin-top: 10px;">
        <label for="whitening-lags">Whitening lags</label>
        <input id="whitening-lags" type="number" min="0" max="60" step="1" value="8">
      </div>
      <div class="grid-2" style="margin-top: 10px;">
        <div>
          <label for="horizon">Horizon</label>
          <input id="horizon" type="number" min="1" max="120" step="1" value="24">
        </div>
        <div>
          <label id="scale-target-label" for="scale-bp">UST2Y target</label>
          <input id="scale-bp" type="number" min="0.01" max="300" step="1" value="10">
          <div class="unit-note" id="scale-target-unit">basis points</div>
        </div>
      </div>
      <div style="margin-top: 10px;">
        <label for="scale-mode">Scale mode</label>
        <select id="scale-mode">
          <option value="ust2y-impact">UST2Y impact</option>
          <option value="ffr-h0">FFR h=0</option>
          <option value="shock-rmse">Series residual SD</option>
          <option value="none">None</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Controls</div>
      <div class="control-group">
        <div class="control-group-header">
          <div class="control-group-title">Market / BS Controls</div>
          <label class="check-row"><input id="toggle-market-controls" type="checkbox" data-group-toggle="market"><span>All Market</span></label>
        </div>
        <details class="control-picker">
          <summary>Individual market controls</summary>
          <div class="control-list" id="controls-market"></div>
        </details>
      </div>
      <div class="control-group">
        <div class="control-group-header">
          <div class="control-group-title">Greenbook Controls</div>
          <label class="check-row"><input id="toggle-greenbook-controls" type="checkbox" data-group-toggle="greenbook"><span>All Greenbook</span></label>
        </div>
        <details class="control-picker">
          <summary>Individual Greenbook controls</summary>
          <div class="control-list" id="controls-greenbook"></div>
        </details>
      </div>
      <div class="control-group">
        <div class="control-group-title">FRED Macro Controls</div>
        <div style="margin-bottom: 9px;">
          <label for="macro-lags">FRED macro-control lags</label>
          <input id="macro-lags" type="number" min="0" max="60" step="1" value="12">
        </div>
        <div class="control-list" id="controls-fred-macro"></div>
      </div>
    </div>

    <div class="section">
      <div class="grid-2">
        <button class="secondary" id="reset-btn" type="button"><i data-lucide="rotate-ccw"></i>Reset</button>
        <button class="primary" id="run-btn" type="button"><i data-lucide="play"></i>Run</button>
      </div>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="topbar-head">
        <div>
          <div class="chart-title" id="chart-title">IRF</div>
          <div class="chart-subtitle" id="chart-subtitle">90% HC1 robust confidence band</div>
        </div>
        <div class="status" id="status-pills"></div>
      </div>
      <div class="plot-controls">
        <div class="view-tabs" role="tablist" aria-label="Plot view">
          <button class="view-tab active" type="button" data-view="irf" role="tab" aria-selected="true">IRF panel</button>
          <button class="view-tab" type="button" data-view="decomp" role="tab" aria-selected="false">LP decomp</button>
        </div>
        <div class="decomp-control hidden">
          <label>Horizon lines</label>
          <details class="top-dropdown" id="decomp-horizon-dropdown">
            <summary id="decomp-horizon-summary">h=3, 6, 9</summary>
            <div class="dropdown-panel">
              <div class="dropdown-actions">
                <button class="mini-action" id="decomp-default-horizons" type="button">3, 6, 9</button>
                <button class="mini-action" id="decomp-all-horizons" type="button">All</button>
              </div>
              <div class="horizon-list" id="decomp-horizons"></div>
            </div>
          </details>
        </div>
      </div>
    </div>
    <div id="error" class="error hidden"></div>
    <div id="plot"></div>
    <div class="diagnostics" id="diagnostics"></div>
  </main>
</div>

<script>
const DATA_URL = "irfs-data.json?v=lpdecomp-view-20260524";
const Z90 = 1.6448536269514722;
const EPS = 1e-10;
const DISPLAY_ZERO_TOL = 1e-10;

let DATA = null;
let macroByMonth = new Map();
let monthIndex = new Map();
let months = [];
const OUTCOME_ORDER = ["ffr", "unrate", "cpi", "pce", "ip", "ebp"];
const DEFAULT_DECOMP_HORIZONS = [3, 6, 9];
const DECOMP_COLORS = ["#167c80", "#9a4055", "#b66d12", "#4d6fb3", "#6c5b7b", "#2f6f4e", "#8a5a2b", "#52616b"];
const PANEL_LABELS = {
  ffr: "FFR",
  unrate: "Unemployment",
  cpi: "CPI",
  pce: "PCE",
  ip: "Industrial Production",
  ebp: "EBP"
};
const MONTH_SUM_SCALE_COLUMNS = ["ust2y"];
const DEFAULT_UST2Y_TARGET_BP = 10;

const CONTROL_LABELS = {
  nfp_surp: "NFP surprise",
  nfp_12m: "NFP 12m",
  sp500_3m: "S&P 3m",
  slope_3m: "Slope 3m",
  bcom_3m: "BCOM 3m",
  tr_skew: "TR skew",
  gRGDPB1: "RGDP B1",
  gRGDPF0: "RGDP F0",
  gRGDPF1: "RGDP F1",
  gRGDPF2: "RGDP F2",
  gRGDPF3: "RGDP F3",
  DgRGDPB1: "Δ RGDP B1",
  DgRGDPF0: "Δ RGDP F0",
  DgRGDPF1: "Δ RGDP F1",
  DgRGDPF2: "Δ RGDP F2",
  gPGDPB1: "PGDP B1",
  gPGDPF0: "PGDP F0",
  gPGDPF1: "PGDP F1",
  gPGDPF2: "PGDP F2",
  gPGDPF3: "PGDP F3",
  DgPGDPB1: "Δ PGDP B1",
  DgPGDPF0: "Δ PGDP F0",
  DgPGDPF1: "Δ PGDP F1",
  DgPGDPF2: "Δ PGDP F2",
  UNEMPF0: "UNEMP F0",
  ffr: "FFR",
  ebp: "EBP",
  GS1: "1Y Treasury",
  dgdp: "Δ BBK GDP",
  dunemp: "Δ Unemp",
  dlip: "Δ log IP",
  dlcpi: "Δ log CPI",
  dlpce: "Δ log PCE",
  dlsent: "Δ log sentiment",
  dlnas: "Δ log NASDAQ",
  dlmpu: "Δ log EPU"
};

function finite(v) {
  return typeof v === "number" && Number.isFinite(v);
}

function asNumber(v) {
  const x = Number(v);
  return Number.isFinite(x) ? x : null;
}

function cleanZero(v) {
  return finite(v) && Math.abs(v) < DISPLAY_ZERO_TOL ? 0 : v;
}

function fmt(x, digits = 3) {
  return finite(x) ? cleanZero(x).toFixed(digits) : "NA";
}

function fmtTarget(x) {
  if (!finite(x)) return "NA";
  return Number.parseFloat(cleanZero(x).toFixed(4)).toString();
}

function outcomeLabel(key) {
  return PANEL_LABELS[key] || DATA?.outcomes?.[key]?.label || key;
}

function truthyFlag(v) {
  return v === 1 || v === true || v === "1";
}

function sumFiniteRows(rows, key) {
  let total = 0;
  let found = false;
  for (const row of rows) {
    if (finite(row[key])) {
      total += row[key];
      found = true;
    }
  }
  return found ? total : null;
}

function allSeries() {
  return DATA?.series || DATA?.shocks || {};
}

function seriesSpec(key) {
  return allSeries()[key] || {};
}

function isMonthlySeries(key) {
  return seriesSpec(key).frequency === "monthly";
}

function sourceValue(row, key) {
  if (row && finite(row[key])) return row[key];
  const m = macroByMonth.get(row?.month);
  if (m && finite(m[key])) return m[key];
  return null;
}

function seriesValue(row, key) {
  if (isMonthlySeries(key)) return sourceValue(row, key);
  return finite(row?.[key]) ? row[key] : null;
}

function monthValue(month, source) {
  const row = macroByMonth.get(month);
  if (!row || !finite(row[source])) return null;
  return row[source];
}

function isZlbMonth(month) {
  const row = macroByMonth.get(month);
  return row ? truthyFlag(row.zlb) : false;
}

function isCovidLeadMonth(month) {
  return month >= "2020-03" && month <= "2021-03";
}

function excludedLeadYear(month, settings) {
  const year = Number.parseInt(month?.slice(0, 4), 10);
  return Number.isFinite(year) && (settings.excludeLeadYears || []).includes(year);
}

function isSuppressedLeadMonth(month, settings) {
  return (!settings.includeCovid && isCovidLeadMonth(month)) ||
    excludedLeadYear(month, settings);
}

function macroLagValue(controlKey, baseMonth, lag) {
  const baseIdx = monthIndex.get(baseMonth);
  if (baseIdx === undefined) return null;
  const idx = baseIdx - lag;
  if (idx < 0) return null;
  return monthValue(months[idx], controlKey);
}

function responseValue(outcomeKey, baseMonth, h, settings = {}) {
  const spec = DATA.outcomes[outcomeKey];
  const baseIdx = monthIndex.get(baseMonth);
  if (baseIdx === undefined) return null;
  const leadIdx = baseIdx + h;
  const prevIdx = baseIdx - 1;
  if (leadIdx < 0 || leadIdx >= months.length || prevIdx < 0) return null;
  const leadMonth = months[leadIdx];
  if (isSuppressedLeadMonth(leadMonth, settings)) return null;
  const prevMonth = months[prevIdx];
  const lead = monthValue(leadMonth, spec.source);
  const prev = monthValue(prevMonth, spec.source);
  if (!finite(lead) || !finite(prev)) return null;
  if (spec.transform === "logdiff100") {
    if (lead <= 0 || prev <= 0) return null;
    return 100 * (Math.log(lead) - Math.log(prev));
  }
  return lead - prev;
}

function dependentDelta(outcomeKey, baseMonth, lag) {
  const spec = DATA.outcomes[outcomeKey];
  const baseIdx = monthIndex.get(baseMonth);
  if (baseIdx === undefined) return null;
  const curIdx = baseIdx - lag;
  const prevIdx = baseIdx - lag - 1;
  if (curIdx < 0 || prevIdx < 0) return null;
  const cur = monthValue(months[curIdx], spec.source);
  const prev = monthValue(months[prevIdx], spec.source);
  if (!finite(cur) || !finite(prev)) return null;
  if (spec.transform === "logdiff100") {
    if (cur <= 0 || prev <= 0) return null;
    return 100 * (Math.log(cur) - Math.log(prev));
  }
  return cur - prev;
}

function scaleTargetConfig(mode) {
  if (mode === "ust2y-impact") {
    return {
      label: "UST2Y target",
      unit: "basis points",
      value: DATA.meta.defaults.scale_to_ust2y_bp ?? DEFAULT_UST2Y_TARGET_BP,
      min: 0.01,
      max: 300,
      step: 1
    };
  }
  if (mode === "ffr-h0") {
    return {
      label: "FFR h=0 target",
      unit: "basis points",
      value: DATA.meta.defaults.scale_to_ffr_h0_bp ?? DATA.meta.defaults.scale_to_ffr_h1_bp ?? 50,
      min: 0.01,
      max: 300,
      step: 1
    };
  }
  if (mode === "shock-rmse") {

      value: DATA.meta.defaults.scale_to_shock_sd ?? 1,
      min: 0.01,
      max: 20,
      step: 0.25
    };
  }
  return {
    label: "Raw multiplier",
    unit: "multiplier",
    value: 1,
    min: 0,
    max: 20,
    step: 0.25
  };
}

function configureScaleTarget(resetValue = false) {
  const mode = document.getElementById("scale-mode").value;
  const cfg = scaleTargetConfig(mode);
  const input = document.getElementById("scale-bp");
  document.getElementById("scale-target-label").textContent = cfg.label;
  document.getElementById("scale-target-unit").textContent = cfg.unit;
  input.min = cfg.min;
  input.max = cfg.max;
  input.step = cfg.step;
  if (resetValue || !input.value) input.value = cfg.value;
}

function readScaleTarget(mode) {
  const cfg = scaleTargetConfig(mode);
  const value = Number.parseFloat(document.getElementById("scale-bp").value);
  return Number.isFinite(value) ? Math.max(cfg.min, value) : cfg.value;
}

function parseIncludedYears(text) {
  const raw = (text || "").trim();
  if (!raw) return {rules: [], error: null, display: ""};
  const rules = [];
  const labels = [];
  for (const part of raw.split(",")) {
    const token = part.trim();
    if (!token) continue;
    let match = token.match(/^(\d{4})$/);
    if (match) {
      const year = Number.parseInt(match[1], 10);
      rules.push({start: year, end: year});
      labels.push(String(year));
      continue;
    }

    match = token.match(/^(\d{4})\s*-\s*(\d{4})$/);
    if (match) {
      const start = Number.parseInt(match[1], 10);
      const end = Number.parseInt(match[2], 10);
      if (end < start) return {rules: [], error: `bad year range ${token}`, display: raw};
      rules.push({start, end});
      labels.push(`${start}-${end}`);
      continue;
    }

    match = token.match(/^(\d{4})\+$/);
    if (match) {
      const start = Number.parseInt(match[1], 10);
      rules.push({start, end: Infinity});
      labels.push(`${start}+`);
      continue;
    }

    return {rules: [], error: `bad year token ${token}`, display: raw};
  }
  return {rules, error: null, display: labels.join(", ")};
}

function rowYear(row) {
  const stamp = row?.month || row?.date;
  if (!stamp || stamp.length < 4) return null;
  const year = Number.parseInt(stamp.slice(0, 4), 10);
  return Number.isFinite(year) ? year : null;
}

function yearIsIncluded(year, rules) {
  if (!rules.length) return true;
  return Number.isFinite(year) && rules.some(rule => year >= rule.start && year <= rule.end);
}

function currentViewMode() {
  return document.querySelector(".view-tab.active")?.dataset.view || "irf";
}

function defaultDecompHorizons(maxH) {
  const defaults = DEFAULT_DECOMP_HORIZONS.filter(h => h <= maxH);
  return defaults.length ? defaults : [Math.max(0, maxH)];
}

function selectedDecompHorizons(maxH) {
  const selected = Array.from(document.querySelectorAll(".decomp-horizon-check:checked"))
    .map(el => Number.parseInt(el.value, 10))
    .filter(h => Number.isInteger(h) && h >= 0 && h <= maxH);
  const horizons = selected.length ? selected : defaultDecompHorizons(maxH);
  return Array.from(new Set(horizons)).sort((a, b) => a - b);
}

function setDecompHorizons(horizons) {
  const keep = new Set(horizons);
  document.querySelectorAll(".decomp-horizon-check").forEach(el => {
    el.checked = keep.has(Number.parseInt(el.value, 10));
  });
  updateDecompHorizonSummary();
}

function updateDecompHorizonSummary() {
  const maxH = Math.max(0, Number.parseInt(document.getElementById("horizon").value || "0", 10));
  const horizons = selectedDecompHorizons(maxH);
  const text = horizons.length > 8
    ? `${horizons.length} horizons`
    : `h=${horizons.join(", ")}`;
  document.getElementById("decomp-horizon-summary").textContent = text;
}

function renderDecompHorizonOptions(maxH) {
  const previous = selectedDecompHorizons(maxH);
  const selected = new Set(previous.length ? previous : defaultDecompHorizons(maxH));
  const html = Array.from({length: maxH + 1}, (_, h) => (
    `<label class="check-row"><input class="decomp-horizon-check" type="checkbox" value="${h}" ${selected.has(h) ? "checked" : ""}><span>h=${h}</span></label>`
  )).join("");
  document.getElementById("decomp-horizons").innerHTML = html;
  document.querySelectorAll(".decomp-horizon-check").forEach(el => {
    el.addEventListener("change", () => {
      updateDecompHorizonSummary();
      runSpec();
    });
  });
  updateDecompHorizonSummary();
}

function syncViewControls() {
  const decomp = currentViewMode() === "decomp";
  document.querySelectorAll(".decomp-control").forEach(el => el.classList.toggle("hidden", !decomp));
}

function getSettings() {
  const selectedRegularControls = Array.from(document.querySelectorAll(".control-check:checked:not([data-kind='macro'])"))
    .map(el => el.value);
  const selectedMacroControls = Array.from(document.querySelectorAll(".control-check:checked[data-kind='macro']"))
    .map(el => el.value);
  const selectedExcludeYears = Array.from(document.querySelectorAll(".exclude-year-check:checked"))
    .map(el => Number.parseInt(el.value, 10))
    .filter(Number.isFinite);
  const shock = document.getElementById("shock").value;
  const forced = shock === "bs" ? DATA.controls.bs_mandatory : [];
  const scaleMode = document.getElementById("scale-mode").value;
  const includedYears = parseIncludedYears(document.getElementById("included-years").value);
  const horizon = Math.max(1, Number.parseInt(document.getElementById("horizon").value || "24", 10));
  return {
    shock,
    viewMode: currentViewMode(),
    decompHorizons: selectedDecompHorizons(horizon),
    aggregation: document.getElementById("aggregation").value,
    includeZlb: document.getElementById("include-zlb").checked,
    includeCovid: document.getElementById("include-covid").checked,
    excludeLeadYears: selectedExcludeYears,
    excludeUnscheduled: document.getElementById("exclude-unscheduled").checked,
    imputeZeros: document.getElementById("impute-zeros").checked,
    includedYearRules: includedYears.rules,
    includedYearsDisplay: includedYears.display || "all",
    includedYearsError: includedYears.error,
    shockLags: Math.max(0, Number.parseInt(document.getElementById("shock-lags").value || "0", 10)),
    depLags: Math.max(0, Number.parseInt(document.getElementById("dep-lags").value || "0", 10)),
    macroLags: Math.max(0, Number.parseInt(document.getElementById("macro-lags").value || "0", 10)),
    useWhitening: document.getElementById("use-whitening").checked,
    whiteningLags: Math.max(0, Number.parseInt(document.getElementById("whitening-lags").value || "8", 10)),
    horizon,
    scaleTarget: readScaleTarget(scaleMode),
    scaleMode,
    controls: Array.from(new Set([...selectedRegularControls, ...forced])),
    macroControls: Array.from(new Set(selectedMacroControls))
  };
}

function eventPassesBaseFilters(row, settings) {
  const unscheduled = truthyFlag(row.unscheduled) || row.scheduled === 0;
  if (settings.excludeUnscheduled && unscheduled) return false;
  if (settings.aggregation === "main") {
    return truthyFlag(row.main) || (row.main == null && row.scheduled === 1);
  }
  return true;
}

function rowPassesYearFilter(row, settings) {
  return yearIsIncluded(rowYear(row), settings.includedYearRules);
}

function aggregateMonth(items, mode, shockKey) {
  const sorted = items.slice().sort((a, b) => a.date.localeCompare(b.date));
  const base = mode === "month-first" ? sorted[0] : sorted[sorted.length - 1];
  const rec = {...base};
  rec.source = "aggregated";
  rec.date = base.date;
  rec.month = base.month;
  if (mode === "month-sum") {
    rec[shockKey] = sumFiniteRows(sorted, shockKey);
    for (const key of MONTH_SUM_SCALE_COLUMNS) {
      rec[key] = sumFiniteRows(sorted, key);
    }
  } else {
    rec[shockKey] = finite(base[shockKey]) ? base[shockKey] : null;
  }
  const allControls = [...DATA.controls.market, ...DATA.controls.greenbook];
  for (const key of allControls) {
    for (let i = 0; i < sorted.length; i++) {
      if (finite(sorted[i][key])) {
        rec[key] = sorted[i][key];
        break;
      }
    }
  }
  rec.unscheduled = sorted.some(r => truthyFlag(r.unscheduled)) ? 1 : 0;
  rec.main = sorted.some(r => truthyFlag(r.main)) ? 1 : 0;
  return rec;
}

function filteredEventRows(settings, shockKey) {
  let rows = DATA.events.filter(row => eventPassesBaseFilters(row, settings));
  if (settings.aggregation.startsWith("month-")) {
    const groups = new Map();
    for (const row of rows) {
      if (!groups.has(row.month)) groups.set(row.month, []);
      groups.get(row.month).push(row);
    }
    rows = Array.from(groups.values()).map(items => aggregateMonth(items, settings.aggregation, shockKey));
  }
  return rows.sort((a, b) => a.date.localeCompare(b.date));
}

function trimmedSupportRows(filteredRows, settings, shockKey) {
  return filteredRows.filter(row => finite(seriesValue(row, shockKey)));
}

function countUnscheduledSupportRows(settings, shockKey) {
  if (isMonthlySeries(shockKey)) return 0;
  const rowsWithUnscheduled = filteredEventRows({...settings, excludeUnscheduled: false}, shockKey);
  return trimmedSupportRows(rowsWithUnscheduled, settings, shockKey)
    .filter(row => rowPassesYearFilter(row, settings))
    .filter(row => truthyFlag(row.unscheduled) || row.scheduled === 0)
    .length;
}

function sortAnalysisRows(rows) {
  return rows.sort((a, b) => {
    const am = a.month || a.date.slice(0, 7);
    const bm = b.month || b.date.slice(0, 7);
    return am === bm ? a.date.localeCompare(b.date) : am.localeCompare(bm);
  });
}

function attachSeriesHistory(rows, settings, shockKey) {
  const history = [];
  for (const row of rows) {
    const value = seriesValue(row, shockKey);
    row._x = finite(value) ? value : 0;
    row._shockLags = [];
    for (let i = 1; i <= settings.shockLags; i++) {
      row._shockLags.push(history.length >= i ? history[history.length - i] : null);
    }
    history.push(row._x);
  }
  return rows;
}

function buildMonthlySeriesRows(settings, shockKey) {
  const rows = DATA.macro
    .filter(row => finite(seriesValue(row, shockKey)))
    .map(row => ({...row, source: "monthly-series"}));
  attachSeriesHistory(sortAnalysisRows(rows), settings, shockKey);
  return rows.filter(row => rowPassesYearFilter(row, settings));
}

function buildAnalysisRows(settings, shockKey) {
  if (isMonthlySeries(shockKey)) return buildMonthlySeriesRows(settings, shockKey);
  const filtered = filteredEventRows(settings, shockKey);
  const supportRows = trimmedSupportRows(filtered, settings, shockKey);
  let rows;
  if (settings.imputeZeros) {
    if (!supportRows.length) return [];
    const startMonth = supportRows[0].month;
    const endMonth = supportRows[supportRows.length - 1].month;
    const grouped = new Map();
    for (const row of filtered) {
      if (!grouped.has(row.month)) grouped.set(row.month, []);
      grouped.get(row.month).push(row);
    }
    rows = DATA.macro
      .filter(m => m.month >= startMonth && m.month <= endMonth)
      .map(m => {
        const items = grouped.get(m.month) || [];
        const rec = {date: m.date, month: m.month, source: items.length ? "event-month" : "imputed"};
        let total = 0;
        let found = false;
        for (const item of items) {
          if (finite(item[shockKey])) {
            total += item[shockKey];
            found = true;
          }
        }
        rec[shockKey] = found ? total : 0;
        const ust2ySum = sumFiniteRows(items, "ust2y");
        rec.ust2y = finite(ust2ySum) ? ust2ySum : (items.length ? null : 0);
        const allControls = [...DATA.controls.market, ...DATA.controls.greenbook];
        for (const key of allControls) {
          for (let i = 0; i < items.length; i++) {
            if (finite(items[i][key])) {
              rec[key] = items[i][key];
              break;
            }
          }
          if (!finite(rec[key]) && finite(m[key])) rec[key] = m[key];
        }
        rec.unscheduled = items.some(r => truthyFlag(r.unscheduled)) ? 1 : 0;
        rec.main = items.some(r => truthyFlag(r.main)) ? 1 : 0;
        return rec;
      });
  } else {
    rows = supportRows;
  }

  attachSeriesHistory(sortAnalysisRows(rows), settings, shockKey);
  return rows.filter(row => rowPassesYearFilter(row, settings));
}

function buildUsedControls(settings, row, outcomeKey, options = {}) {
  const includeShockLags = options.includeShockLags !== false;
  const zi = [];
  if (includeShockLags) {
    for (let i = 0; i < settings.shockLags; i++) {
      const v = row._shockLags[i];
      if (!finite(v)) return null;
      zi.push(v);
    }
  }

  for (let i = 1; i <= settings.depLags; i++) {
    const v = dependentDelta(outcomeKey, row.month, i);
    if (!finite(v)) return null;
    zi.push(v);
  }

  for (const c of settings.controls) {
    const v = sourceValue(row, c);
    if (!finite(v)) return null;
    zi.push(v);
  }

  for (const c of settings.macroControls) {
    for (let lag = 1; lag <= settings.macroLags; lag++) {
      const v = macroLagValue(c, row.month, lag);
      if (!finite(v)) return null;
      zi.push(v);
    }
  }
  return zi;
}

function buildRegressionData(settings, rows, outcomeKey, h, options = {}) {
  const y = [];
  const x = [];
  const controls = [];
  const rowDates = [];
  for (const row of rows) {
    if (!settings.includeZlb && isZlbMonth(row.month)) continue;
    const yi = responseValue(outcomeKey, row.month, h, settings);
    if (!finite(yi) || !finite(row._x)) continue;

    const zi = buildUsedControls(settings, row, outcomeKey, options);
    if (!zi) continue;

    y.push(yi);
    x.push(row._x);
    controls.push(zi);
    rowDates.push(row.date);
  }
  return {y, x, controls, rowDates};
}

function buildShockScaleData(settings, rows, outcomeKey, options = {}) {
  const x = [];
  const controls = [];
  for (const row of rows) {
    if (!settings.includeZlb && isZlbMonth(row.month)) continue;
    if (!finite(row._x)) continue;

    const zi = buildUsedControls(settings, row, outcomeKey, options);
    if (!zi) continue;

    x.push(row._x);
    controls.push(zi);
  }
  return {x, controls};
}

function buildImpactScaleData(settings, rows, outcomeKey, options = {}) {
  const y = [];
  const x = [];
  const controls = [];
  for (const row of rows) {
    if (!settings.includeZlb && isZlbMonth(row.month)) continue;
    if (!finite(row._x)) continue;
    if (!finite(responseValue(outcomeKey, row.month, 0, settings))) continue;
    const ust2y = sourceValue(row, "ust2y");
    if (!finite(ust2y)) continue;

    const zi = buildUsedControls(settings, row, outcomeKey, options);
    if (!zi) continue;

    y.push(ust2y);
    x.push(row._x);
    controls.push(zi);
  }
  return {y, x, controls};
}

function solveLinear(a, b) {
  const n = b.length;
  const m = a.map((row, i) => row.slice().concat([b[i]]));
  for (let col = 0; col < n; col++) {
    let pivot = col;
    for (let r = col + 1; r < n; r++) {
      if (Math.abs(m[r][col]) > Math.abs(m[pivot][col])) pivot = r;
    }
    if (Math.abs(m[pivot][col]) < EPS) return null;
    if (pivot !== col) [m[pivot], m[col]] = [m[col], m[pivot]];
    const div = m[col][col];
    for (let c = col; c <= n; c++) m[col][c] /= div;
    for (let r = 0; r < n; r++) {
      if (r === col) continue;
      const factor = m[r][col];
      for (let c = col; c <= n; c++) m[r][c] -= factor * m[col][c];
    }
  }
  return m.map(row => row[n]);
}

function residualize(v, z) {
  const n = v.length;
  if (!z.length || !z[0].length) {
    const mean = v.reduce((a, b) => a + b, 0) / n;
    return v.map(x => x - mean);
  }
  const k = z[0].length;
  const xtx = Array.from({length: k}, () => Array(k).fill(0));
  const xty = Array(k).fill(0);
  for (let i = 0; i < n; i++) {
    for (let a = 0; a < k; a++) {
      xty[a] += z[i][a] * v[i];
      for (let b = 0; b < k; b++) xtx[a][b] += z[i][a] * z[i][b];
    }
  }
  const beta = solveLinear(xtx, xty);
  if (!beta) return null;
  return v.map((val, i) => {
    let fit = 0;
    for (let j = 0; j < k; j++) fit += z[i][j] * beta[j];
    return val - fit;
  });
}

function residualizeThrough(v, z) {
  const n = v.length;
  if (!z.length || !z[0].length) return v.slice();
  const k = z[0].length;
  const xtx = Array.from({length: k}, () => Array(k).fill(0));
  const xty = Array(k).fill(0);
  for (let i = 0; i < n; i++) {
    for (let a = 0; a < k; a++) {
      xty[a] += z[i][a] * v[i];
      for (let b = 0; b < k; b++) xtx[a][b] += z[i][a] * z[i][b];
    }
  }
  const beta = solveLinear(xtx, xty);
  if (!beta) return null;
  return v.map((val, i) => {
    let fit = 0;
    for (let j = 0; j < k; j++) fit += z[i][j] * beta[j];
    return val - fit;
  });
}

function cleanColumns(matrix) {
  if (!matrix.length || !matrix[0]?.length) return {z: matrix.map(() => []), k: 0};
  const n = matrix.length;
  const rawK = matrix[0].length;
  const keep = [];
  for (let j = 0; j < rawK; j++) {
    let min = Infinity;
    let max = -Infinity;
    for (let i = 0; i < n; i++) {
      min = Math.min(min, matrix[i][j]);
      max = Math.max(max, matrix[i][j]);
    }
    if (max - min > EPS) keep.push(j);
  }
  return {z: matrix.map(row => keep.map(j => row[j])), k: keep.length};
}

function designRowsWithIntercept(z, n) {
  if (!z.length || !z[0]?.length) return Array.from({length: n}, () => [1]);
  return z;
}

function olsResiduals(y, design) {
  const n = y.length;
  if (!n || !design.length || !design[0]?.length) return null;
  const k = design[0].length;
  const xtx = Array.from({length: k}, () => Array(k).fill(0));
  const xty = Array(k).fill(0);
  for (let i = 0; i < n; i++) {
    for (let a = 0; a < k; a++) {
      xty[a] += design[i][a] * y[i];
      for (let b = 0; b < k; b++) xtx[a][b] += design[i][a] * design[i][b];
    }
  }
  const beta = solveLinear(xtx, xty);
  if (!beta) return null;
  return y.map((val, i) => {
    let fit = 0;
    for (let j = 0; j < k; j++) fit += design[i][j] * beta[j];
    return val - fit;
  });
}

function cleanZ(controls) {
  if (!controls.length) return {z: [], k: 1};
  const n = controls.length;
  const rawK = controls[0].length;
  const keep = [];
  for (let j = 0; j < rawK; j++) {
    let min = Infinity;
    let max = -Infinity;
    for (let i = 0; i < n; i++) {
      min = Math.min(min, controls[i][j]);
      max = Math.max(max, controls[i][j]);
    }
    if (max - min > EPS) keep.push(j);
  }
  const z = controls.map(row => [1, ...keep.map(j => row[j])]);
  return {z, k: 1 + keep.length};
}

function partialOls(y, x, controls) {
  const n = y.length;
  if (n < 8) return null;
  let {z, k} = cleanZ(controls);
  let rx = null;
  let ry = null;
  while (true) {
    rx = residualize(x, z);
    ry = residualize(y, z);
    if (rx && ry) break;
    if (!z.length || z[0].length <= 1) return null;
    z = z.map(row => row.slice(0, -1));
    k -= 1;
  }
  const denom = rx.reduce((acc, v) => acc + v * v, 0);
  if (denom < EPS) return null;
  const beta = rx.reduce((acc, v, i) => acc + v * ry[i], 0) / denom;
  const resid = ry.map((v, i) => v - beta * rx[i]);
  const p = k + 1;
  if (n <= p) return null;
  let meat = 0;
  for (let i = 0; i < n; i++) meat += rx[i] * rx[i] * resid[i] * resid[i];
  const variance = (n / (n - p)) * meat / (denom * denom);
  return {
    beta,
    se: Math.sqrt(Math.max(0, variance)),
    n,
    p,
    droppedControls: controls[0]?.length ? controls[0].length - (k - 1) : 0
  };
}

function buildWhitenedShock(x, controls, lags) {
  const n = x.length;
  if (n < 8) return null;
  let {z, k} = cleanZ(controls);
  let xTilde = null;
  while (true) {
    xTilde = residualize(x, z);
    if (xTilde) break;
    if (!z.length || z[0].length <= 1) return null;
    z = z.map(row => row.slice(0, -1));
    k -= 1;
  }

  const p = Math.max(0, lags);
  const wRowsAll = designRowsWithIntercept(z, n);
  const indices = [];
  const tilde = [];
  const wRows = [];
  const lagRows = [];
  for (let i = p; i < n; i++) {
    const lagRow = [];
    let ok = true;
    for (let lag = 1; lag <= p; lag++) {
      const v = xTilde[i - lag];
      if (!finite(v)) { ok = false; break; }
      lagRow.push(v);
    }
    if (!ok) continue;
    indices.push(i);
    tilde.push(xTilde[i]);
    wRows.push(wRowsAll[i]);
    lagRows.push(lagRow);
  }
  if (tilde.length < 8) return null;

  let {z: lRows, k: lK} = cleanColumns(lagRows);
  let r = null;
  while (true) {
    r = residualizeThrough(tilde, lRows);
    if (r) break;
    if (!lRows.length || !lRows[0].length) return null;
    lRows = lRows.map(row => row.slice(0, -1));
    lK -= 1;
  }

  const denom = r.reduce((acc, v) => acc + v * v, 0);
  if (denom < EPS) return null;
  return {
    r,
    indices,
    wRows,
    lRows,
    n: r.length,
    wK: wRows[0]?.length || 0,
    lK,
    droppedControls: controls[0]?.length ? controls[0].length - (k - 1) : 0,
    droppedWhiteningLags: Math.max(0, p - lK)
  };
}

function whitenedOls(y, x, controls, lags) {
  const model = buildWhitenedShock(x, controls, lags);
  if (!model) return null;
  const y2 = model.indices.map(i => y[i]);
  const x2 = model.indices.map(i => x[i]);
  const denom = model.r.reduce((acc, v) => acc + v * v, 0);
  const beta = model.r.reduce((acc, v, i) => acc + v * y2[i], 0) / denom;
  const fullDesign = y2.map((_, i) => [x2[i], ...model.wRows[i], ...model.lRows[i]]);
  const fullResid = olsResiduals(y2, fullDesign);
  const resid = fullResid || y2.map((v, i) => v - beta * model.r[i]);
  const p = 1 + model.wK + model.lK;
  if (model.n <= p) return null;
  let meat = 0;
  for (let i = 0; i < model.n; i++) meat += model.r[i] * model.r[i] * resid[i] * resid[i];
  const variance = (model.n / (model.n - p)) * meat / (denom * denom);
  return {
    beta,
    se: Math.sqrt(Math.max(0, variance)),
    n: model.n,
    p,
    droppedControls: model.droppedControls,
    droppedWhiteningLags: model.droppedWhiteningLags
  };
}

function fitShockResponse(y, x, controls, settings) {
  if (settings.useWhitening) return whitenedOls(y, x, controls, settings.whiteningLags);
  return partialOls(y, x, controls);
}

function standardDecompParts(y, x, controls) {
  let {z, k} = cleanZ(controls);
  let rx = null;
  let ry = null;
  while (true) {
    rx = residualize(x, z);
    ry = residualize(y, z);
    if (rx && ry) break;
    if (!z.length || z[0].length <= 1) return null;
    z = z.map(row => row.slice(0, -1));
    k -= 1;
  }
  const denom = rx.reduce((acc, v) => acc + v * v, 0);
  if (denom < EPS) return null;
  const beta = rx.reduce((acc, v, i) => acc + v * ry[i], 0) / denom;
  return {rx, yResidual: ry, denom, beta, n: y.length, p: k + 1};
}

function buildDecompLine(settings, rows, outcomeKey, h, scale) {
  const reg = buildRegressionData(settings, rows, outcomeKey, h, {includeShockLags: !settings.useWhitening});
  if (reg.y.length < 8) return null;
  let dates = reg.rowDates;
  let weights = null;
  let yForContribution = reg.y;
  let beta = null;
  let n = reg.y.length;
  let p = 0;

  if (settings.useWhitening) {
    const model = buildWhitenedShock(reg.x, reg.controls, settings.whiteningLags);
    if (!model) return null;
    const denom = model.r.reduce((acc, v) => acc + v * v, 0);
    if (denom < EPS) return null;
    dates = model.indices.map(i => reg.rowDates[i]);
    yForContribution = model.indices.map(i => reg.y[i]);
    weights = model.r.map(v => v / denom);
    beta = model.r.reduce((acc, v, i) => acc + v * yForContribution[i], 0) / denom;
    n = model.n;
    p = 1 + model.wK + model.lK;
  } else {
    const parts = standardDecompParts(reg.y, reg.x, reg.controls);
    if (!parts) return null;
    weights = parts.rx.map(v => v / parts.denom);
    yForContribution = parts.yResidual;
    beta = parts.beta;
    n = parts.n;
    p = parts.p;
  }

  let cumulative = 0;
  const values = [];
  for (let i = 0; i < yForContribution.length; i++) {
    cumulative += weights[i] * yForContribution[i] * scale;
    values.push(cleanZero(cumulative));
  }
  return {
    h,
    dates,
    values,
    betaScaled: cleanZero(beta * scale),
    n,
    p
  };
}

function decompPlotLine(line, outcomeKey) {
  const dates = [];
  const values = [];
  const hover = [];
  for (let i = 0; i < line.dates.length; i++) {
    dates.push(line.dates[i]);
    values.push(line.values[i]);
    hover.push(
      `${DATA.outcomes[outcomeKey].label}<br>${line.dates[i]}<br>h=${line.h}<br>contribution=${fmt(line.values[i], 4)}<br>end=${fmt(line.betaScaled, 4)}<br>n=${line.n}<extra></extra>`
    );
  }
  return {dates, values, hover};
}

function shockResidualRmse(x, controls) {
  const n = x.length;
  if (n < 8) return null;
  let {z, k} = cleanZ(controls);
  let rx = null;
  while (true) {
    rx = residualize(x, z);
    if (rx) break;
    if (!z.length || z[0].length <= 1) return null;
    z = z.map(row => row.slice(0, -1));
    k -= 1;
  }
  const rss = rx.reduce((acc, v) => acc + v * v, 0);
  if (n <= k) return null;
  return {
    rmse: Math.sqrt(rss / (n - k)),
    n,
    p: k,
    droppedControls: controls[0]?.length ? controls[0].length - (k - 1) : 0
  };
}

function whitenedShockResidualRmse(x, controls, lags) {
  const model = buildWhitenedShock(x, controls, lags);
  if (!model) return null;
  const rss = model.r.reduce((acc, v) => acc + v * v, 0);
  const p = model.wK + model.lK;
  if (model.n <= p) return null;
  return {
    rmse: Math.sqrt(rss / (model.n - p)),
    n: model.n,
    p,
    droppedControls: model.droppedControls,
    droppedWhiteningLags: model.droppedWhiteningLags
  };
}

function runOutcome(settings, rows, outcomeKey, maxH) {
  const results = [];
  for (let h = 0; h <= maxH; h++) {
    const reg = buildRegressionData(settings, rows, outcomeKey, h, {includeShockLags: !settings.useWhitening});
    const fit = fitShockResponse(reg.y, reg.x, reg.controls, settings);
    results.push({
      h,
      beta: fit ? fit.beta : null,
      se: fit ? fit.se : null,
      n: fit ? fit.n : 0,
      p: fit ? fit.p : 0,
      dates: reg.rowDates
    });
  }
  return results;
}

function runSpec() {
  const settings = getSettings();
  syncBsControls();
  if (settings.includedYearsError) {
    showError(`Invalid included years: ${settings.includedYearsError}. Use entries like 1993-2007, 2010, 2024+.`);
    return;
  }
  const rows = buildAnalysisRows(settings, settings.shock);
  const unscheduledSupportRows = countUnscheduledSupportRows(settings, settings.shock);
  if (rows.length < 12) {
    showError("The selected sample has too few usable series observations.");
    return;
  }

  const maxH = Math.max(settings.horizon, 1);
  let scaleDisplay = "1.000";
  let ffrH0 = null;
  const rawByOutcome = {};
  for (const outcome of OUTCOME_ORDER) {
    rawByOutcome[outcome] = runOutcome(settings, rows, outcome, maxH);
  }
  const scaleByOutcome = Object.fromEntries(OUTCOME_ORDER.map(outcome => [outcome, 1]));
  if (settings.scaleMode === "ust2y-impact") {
    const target = settings.scaleTarget / 100;
    const coefs = [];
    for (const outcome of OUTCOME_ORDER) {
      const scaleData = buildImpactScaleData(settings, rows, outcome, {includeShockLags: !settings.useWhitening});
      const fit = fitShockResponse(scaleData.y, scaleData.x, scaleData.controls, settings);
      if (!fit || !finite(fit.beta)) {
        showError(`UST2Y impact scaling failed for ${outcomeLabel(outcome)} because the scaling regression could not be estimated. Choose a different scaling method.`);
        return;
      }
      if (fit.beta < 0) {
        showError(`UST2Y impact scaling failed for ${outcomeLabel(outcome)} because the series coefficient is negative (${fmt(fit.beta, 4)}). Choose a different scaling method.`);
        return;
      }
      if (Math.abs(fit.beta) < EPS) {
        showError(`UST2Y impact scaling failed for ${outcomeLabel(outcome)} because the series coefficient is effectively zero. Choose a different scaling method.`);
        return;
      }
      scaleByOutcome[outcome] = target / fit.beta;
      coefs.push(fit.beta);
    }
    const minCoef = Math.min(...coefs);
    const maxCoef = Math.max(...coefs);
    const coefDisplay = Math.abs(maxCoef - minCoef) < 1e-8
      ? fmt(minCoef, 4)
      : `${fmt(minCoef, 4)}-${fmt(maxCoef, 4)}`;
    scaleDisplay = `${fmtTarget(settings.scaleTarget)}bp UST2Y; coef ${coefDisplay}`;
  } else if (settings.scaleMode === "ffr-h0") {
    ffrH0 = rawByOutcome.ffr[0]?.beta;
    if (!finite(ffrH0) || Math.abs(ffrH0) < EPS) {
      showError("Scaling failed because the FFR h=0 coefficient is unavailable or effectively zero.");
      return;
    }
    const scale = (settings.scaleTarget / 100) / ffrH0;
    for (const outcome of OUTCOME_ORDER) scaleByOutcome[outcome] = scale;
    scaleDisplay = `${fmtTarget(settings.scaleTarget)}bp FFR; scale ${fmt(scale, 3)}`;
  } else if (settings.scaleMode === "shock-rmse") {
    const rmseByOutcome = [];
    for (const outcome of OUTCOME_ORDER) {
      const scaleData = buildShockScaleData(settings, rows, outcome, {includeShockLags: !settings.useWhitening});
      const fit = settings.useWhitening
        ? whitenedShockResidualRmse(scaleData.x, scaleData.controls, settings.whiteningLags)
        : shockResidualRmse(scaleData.x, scaleData.controls);
      if (!fit || !finite(fit.rmse)) {
        showError(`Series residual SD scaling failed for ${outcomeLabel(outcome)}.`);
        return;
      }
      scaleByOutcome[outcome] = settings.scaleTarget * fit.rmse;
      rmseByOutcome.push(fit.rmse);
    }
    const minScale = Math.min(...rmseByOutcome);
    const maxScale = Math.max(...rmseByOutcome);
    const rmseDisplay = Math.abs(maxScale - minScale) < 1e-8
      ? fmt(minScale, 3)
      : `${fmt(minScale, 3)}-${fmt(maxScale, 3)}`;
    scaleDisplay = `${fmtTarget(settings.scaleTarget)} SD; rmse ${rmseDisplay}`;
  } else if (settings.scaleMode === "none") {
    for (const outcome of OUTCOME_ORDER) scaleByOutcome[outcome] = settings.scaleTarget;
    scaleDisplay = `raw x ${fmtTarget(settings.scaleTarget)}`;
  }

  const resultsByOutcome = {};
  for (const outcome of OUTCOME_ORDER) {
    const scale = scaleByOutcome[outcome];
    resultsByOutcome[outcome] = rawByOutcome[outcome].slice(0, settings.horizon + 1).map(r => {
      const mid = finite(r.beta) ? r.beta * scale : null;
      const a = finite(r.beta) && finite(r.se) ? (r.beta - Z90 * r.se) * scale : null;
      const b = finite(r.beta) && finite(r.se) ? (r.beta + Z90 * r.se) * scale : null;
      return {
        ...r,
        betaScaled: finite(mid) ? cleanZero(mid) : null,
        lo: finite(a) && finite(b) ? cleanZero(Math.min(a, b)) : null,
        hi: finite(a) && finite(b) ? cleanZero(Math.max(a, b)) : null
      };
    });
  }
  render(settings, rows, resultsByOutcome, scaleByOutcome, scaleDisplay, ffrH0, unscheduledSupportRows);
}

function axisRef(i, axis) {
  return i === 0 ? axis : `${axis}${i + 1}`;
}

function axisLayoutName(i, axis) {
  return i === 0 ? `${axis}axis` : `${axis}axis${i + 1}`;
}

  const shockLabel = seriesSpec(settings.shock).label;
  document.getElementById("chart-title").textContent = `LP decomposition: responses to ${shockLabel}`;
  document.getElementById("chart-subtitle").textContent = "Cumulative FWL contributions by selected horizon";
  const horizons = settings.decompHorizons.filter(h => h <= settings.horizon);
  const traces = [];
  const annotations = [];

  const layout = {
    paper_bgcolor: "#ffffff",
    plot_bgcolor: "#ffffff",
    margin: {l: 74, r: 24, t: 30, b: 66},
    hovermode: "closest",
    showlegend: true,
    legend: {orientation: "h", x: 0, y: 1.09, xanchor: "left", yanchor: "bottom"},
    font: {family: "Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif", color: "#17201b"}
  };

  const xGap = 0.085;
  const yGap = 0.26;
  const yPadBottom = 0.075;
  const yPadTop = 0.05;
  const colW = (1 - 2 * xGap) / 3;
  const rowH = (1 - yGap - yPadBottom - yPadTop) / 2;
  const legendShown = new Set();
  OUTCOME_ORDER.forEach((outcome, i) => {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const xDomain = [col * (colW + xGap), col * (colW + xGap) + colW];
    const yDomain = row === 0 ? [yPadBottom + rowH + yGap, 1 - yPadTop] : [yPadBottom, yPadBottom + rowH];
    const xName = axisLayoutName(i, "x");
    const yName = axisLayoutName(i, "y");
    const xRef = axisRef(i, "x");
    const yRef = axisRef(i, "y");
    layout[xName] = {
      domain: xDomain,
      anchor: yRef,
      title: col === 1 ? {text: "Estimation date", standoff: 8, font: {size: 11}} : "",
      showticklabels: true,
      type: "date",
      tickfont: {size: 10},
      tickformat: "%Y",
      dtick: "M48",
      zeroline: false,
      gridcolor: "#eef2ef",
      automargin: true
    };
    layout[yName] = {
      domain: yDomain,
      anchor: xRef,
      title: col === 0 ? {text: "Cumulative contribution", standoff: 8, font: {size: 11}} : "",
      tickfont: {size: 10},
      tickformat: ".4~f",
      labelalias: {"-0": "0", "-0.0000": "0", "−0": "0", "−0.0000": "0"},
      zeroline: false,
      gridcolor: "#eef2ef",
      automargin: true
    };
    annotations.push({
      text: `<b>${PANEL_LABELS[outcome] || DATA.outcomes[outcome].label}</b>`,
      x: (xDomain[0] + xDomain[1]) / 2,
      y: yDomain[1] + 0.035,
      xref: "paper",
      yref: "paper",
      showarrow: false,
      font: {size: 13, color: "#17201b"}
    });

    traces.push({
      x: rows.map(row => row.date),
      y: rows.map(() => 0),
      type: "scatter",
      mode: "lines",
      line: {color: "#9aa49d", width: 1, dash: "dot"},
      hoverinfo: "skip",
      showlegend: false,
      xaxis: xRef,
      yaxis: yRef
    });

    const scale = scaleByOutcome[outcome] ?? 1;
    horizons.forEach((h, hIndex) => {
      const line = buildDecompLine(settings, rows, outcome, h, scale);
      if (!line || !line.dates.length) return;
      const plotLine = decompPlotLine(line, outcome);
      const color = DECOMP_COLORS[hIndex % DECOMP_COLORS.length];
      const showLegend = !legendShown.has(h);
      if (showLegend) legendShown.add(h);
      traces.push({
        x: plotLine.dates,
        y: plotLine.values,
        type: "scatter",
        mode: "lines",
        line: {color, width: 2.1},
        name: `h=${line.h}`,
        legendgroup: `h${line.h}`,
        showlegend: showLegend,
        connectgaps: true,
        hovertemplate: plotLine.hover,
        xaxis: xRef,
        yaxis: yRef
      });
    });
  });
  layout.annotations = annotations;
  Plotly.react("plot", traces, layout, {responsive: true, displayModeBar: false});
}

  const traces = [];

  const layout = {

    const yDomain = row === 0 ? [yPadBottom + rowH + yGap, 1 - yPadTop] : [yPadBottom, yPadBottom + rowH];
    const xName = axisLayoutName(i, "x");
    const yName = axisLayoutName(i, "y");

    layout[xName] = {

    layout[yName] = {
      domain: yDomain,
      anchor: xRef,

      tickfont: {size: 10},

    };
    annotations.push({

    const zeroTrace = {

      mode: "lines",

      xaxis: axisRef(i, "x"),

    };
    traces.push(zeroTrace);

    traces.push({

  Plotly.react("plot", traces, layout, {responsive: true, displayModeBar: false});

    metric("Whitening", settings.useWhitening ? settings.whiteningLags : "off"),
    metric("Outcome lags", settings.depLags),
    metric("Macro lags", settings.macroLags),
    metric("Max horizon", settings.horizon)
  ].join("");
}

function metric(name, value) {
  return `<div class="metric"><div class="name">${name}</div><div class="value" title="${value}">${value}</div></div>`;
}

function showError(message) {
  const el = document.getElementById("error");
  el.textContent = message;
  el.classList.remove("hidden");
  Plotly.purge("plot");
  document.getElementById("diagnostics").innerHTML = "";
  document.getElementById("status-pills").innerHTML = `<span class="pill warn">No result</span>`;
}

function renderOptions() {
  const shockSel = document.getElementById("shock");
  shockSel.innerHTML = Object.entries(allSeries())
    .map(([key, spec]) => `<option value="${key}">${spec.label}</option>`)
    .join("");

  document.getElementById("shock").value = DATA.meta.defaults.series ?? DATA.meta.defaults.shock;
  document.getElementById("aggregation").value = DATA.meta.defaults.aggregation;
  document.getElementById("included-years").value = DATA.meta.defaults.included_years ?? "1993-2025";
  document.getElementById("shock-lags").value = DATA.meta.defaults.shock_lags;
  document.getElementById("use-whitening").checked = DATA.meta.defaults.use_whitening ?? false;
  document.getElementById("whitening-lags").value = DATA.meta.defaults.whitening_lags ?? 8;
  syncWhiteningControls();
  document.getElementById("dep-lags").value = DATA.meta.defaults.dependent_lags;
  document.getElementById("macro-lags").value = DATA.meta.defaults.macro_lags;
  document.getElementById("horizon").value = DATA.meta.defaults.horizon;
  document.getElementById("scale-mode").value = DATA.meta.defaults.scale_mode ?? "ffr-h0";
  configureScaleTarget(true);
  document.getElementById("include-zlb").checked = DATA.meta.defaults.include_zlb;
  document.getElementById("include-covid").checked = DATA.meta.defaults.include_covid ?? false;
  const defaultExcludeYears = new Set(DATA.meta.defaults.exclude_lead_years || []);
  document.querySelectorAll(".exclude-year-check").forEach(el => {
    el.checked = defaultExcludeYears.has(Number.parseInt(el.value, 10));
  });
  document.getElementById("impute-zeros").checked = DATA.meta.defaults.impute_zeros;
  document.getElementById("exclude-unscheduled").checked = DATA.meta.defaults.exclude_unscheduled;
  renderDecompHorizonOptions(Math.max(1, Number.parseInt(document.getElementById("horizon").value || "24", 10)));
  syncViewControls();

  renderControlChecks("controls-market", DATA.controls.market, "regular", "market");
  renderControlChecks("controls-greenbook", DATA.controls.greenbook, "regular", "greenbook");
  renderControlChecks("controls-fred-macro", DATA.controls.fred_macro, "macro", "fred_macro");
  syncBsControls();
  document.querySelectorAll(".control-check").forEach(el => el.addEventListener("change", runSpec));
}

function renderControlChecks(containerId, controls, kind, group) {
  document.getElementById(containerId).innerHTML = controls.map(c => {
    const label = CONTROL_LABELS[c] || c;
    return `<label class="check-row"><input class="control-check" type="checkbox" value="${c}" data-kind="${kind}" data-group="${group}" data-control="${c}"><span>${label}</span></label>`;
  }).join("");
}

function setControlGroup(group, checked) {
  for (const el of document.querySelectorAll(`.control-check[data-group='${group}']`)) {
    if (!el.disabled) el.checked = checked;
  }
  syncBsControls();
  updateGroupToggles();
  runSpec();
}

function updateGroupToggles() {
  for (const group of ["market", "greenbook"]) {
    const toggle = document.querySelector(`[data-group-toggle='${group}']`);
    const controls = Array.from(document.querySelectorAll(`.control-check[data-group='${group}']`));
    if (!toggle || !controls.length) continue;
    const checked = controls.filter(el => el.checked).length;
    toggle.checked = checked === controls.length;
    toggle.indeterminate = checked > 0 && checked < controls.length;
  }
}

function syncBsControls() {
  const shock = document.getElementById("shock").value;
  const forced = new Set(DATA?.controls?.bs_mandatory || []);
  for (const el of document.querySelectorAll(".control-check")) {
    if (forced.has(el.value)) {
      if (shock === "bs") {
        el.checked = true;
        el.disabled = true;
        el.closest(".check-row").style.color = "#b66d12";
      } else {
        el.disabled = false;
        el.closest(".check-row").style.color = "";
      }
    }
  }
  updateGroupToggles();
}

function syncWhiteningControls() {
  const enabled = document.getElementById("use-whitening").checked;
  const wrap = document.getElementById("whitening-lag-wrap");
  wrap.classList.toggle("hidden", !enabled);
  if (enabled && !document.getElementById("whitening-lags").value) {
    document.getElementById("whitening-lags").value = DATA?.meta?.defaults?.whitening_lags ?? 8;
  }
}

function resetDefaults() {
  renderOptions();
  runSpec();
}

async function init() {
  DATA = await fetch(DATA_URL, {cache: "no-store"}).then(r => {
    if (!r.ok) throw new Error(`Failed to load ${DATA_URL}`);
    return r.json();
  });
  months = DATA.macro.map(row => row.month);
  macroByMonth = new Map(DATA.macro.map(row => [row.month, row]));
  monthIndex = new Map(months.map((m, i) => [m, i]));
  document.getElementById("data-stamp").textContent = `Snapshot ${DATA.meta.built_at.slice(0, 10)} - ${DATA.events.length} events`;
  renderOptions();
  document.getElementById("run-btn").addEventListener("click", runSpec);
  document.getElementById("reset-btn").addEventListener("click", resetDefaults);
  document.getElementById("toggle-market-controls").addEventListener("change", event => setControlGroup("market", event.target.checked));
  document.getElementById("toggle-greenbook-controls").addEventListener("change", event => setControlGroup("greenbook", event.target.checked));
  document.querySelectorAll(".view-tab").forEach(button => {
    button.addEventListener("click", () => {
      document.querySelectorAll(".view-tab").forEach(el => {
        const active = el === button;
        el.classList.toggle("active", active);
        el.setAttribute("aria-selected", active ? "true" : "false");
      });
      syncViewControls();
      runSpec();
    });
  });
  document.getElementById("decomp-default-horizons").addEventListener("click", () => {
    setDecompHorizons(defaultDecompHorizons(Math.max(1, Number.parseInt(document.getElementById("horizon").value || "24", 10))));
    runSpec();
  });
  document.getElementById("decomp-all-horizons").addEventListener("click", () => {
    const maxH = Math.max(1, Number.parseInt(document.getElementById("horizon").value || "24", 10));
    setDecompHorizons(Array.from({length: maxH + 1}, (_, h) => h));
    runSpec();
  });
  document.getElementById("shock").addEventListener("change", () => {
    syncBsControls();
    runSpec();
  });
  for (const id of ["aggregation", "include-zlb", "include-covid", "exclude-unscheduled", "impute-zeros"]) {
    document.getElementById(id).addEventListener("change", runSpec);
  }
  document.querySelectorAll(".exclude-year-check").forEach(el => el.addEventListener("change", runSpec));
  document.getElementById("use-whitening").addEventListener("change", () => {
    syncWhiteningControls();
    runSpec();
  });
  document.getElementById("scale-mode").addEventListener("change", () => {
    configureScaleTarget(true);
    runSpec();
  });
  document.getElementById("horizon").addEventListener("change", () => {
    renderDecompHorizonOptions(Math.max(1, Number.parseInt(document.getElementById("horizon").value || "24", 10)));
    runSpec();
  });
  for (const id of ["included-years", "shock-lags", "whitening-lags", "dep-lags", "macro-lags", "scale-bp"]) {
    document.getElementById(id).addEventListener("change", runSpec);
  }
  if (window.lucide) window.lucide.createIcons();
  runSpec();
}

init().catch(err => showError(err.message || String(err)));
</script>
</body>
</html>
