<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twitter Dashboard</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0d1117;
  --panel: #151b23;
  --panel-2: #1b2430;
  --line: #303b49;
  --text: #edf2f7;
  --muted: #9ba8b7;
  --soft: #c8d3df;
  --main: #8bd8bd;
  --main-ai: #9cc9ff;
  --micro: #d8b4fe;
  --skip: #a8b3bf;
  --accent: #f7d774;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 22px 16px 40px; }
.topbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
  margin-bottom: 18px;
}
h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
.stamp { color: var(--muted); font-size: 12px; white-space: nowrap; }
.day-list { display: grid; gap: 12px; }
.day-card, .hour-card {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
}
.day-card, .hour-card {
  width: 100%;
  color: inherit;
  text-align: left;
  cursor: pointer;
  font: inherit;
  appearance: none;
}
.day-card {
  padding: 16px;
}
.day-card:hover, .day-card.active { border-color: var(--accent); background: #192230; }
.hour-card:hover, .hour-card.active { border-color: var(--accent); background: #192230; }
.day-head, .hour-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.day-title, .hour-title { font-weight: 700; font-size: 15px; }
.day-meta, .hour-meta, .empty { color: var(--muted); font-size: 12px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { border: 1px solid var(--line); border-radius: 999px; color: var(--soft); padding: 3px 8px; font-size: 12px; }
.chip[data-section="Main"] { color: var(--main); }
.chip[data-section="Main AI"] { color: var(--main-ai); }
.chip[data-section="Micro AI"] { color: var(--micro); }
.chip[data-section="Skip"] { color: var(--skip); }
.detail { margin-top: 18px; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.hour-card { min-height: 92px; padding: 14px; }
.hour-title { font-size: 16px; }
.report-panel {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
  margin-top: 14px;
  padding: 16px;
}
.report-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
  margin-bottom: 12px;
}
.report { margin-top: 0; }
.section { margin-top: 12px; }
.section:first-child { margin-top: 0; }
.section-title { font-weight: 700; margin-bottom: 7px; }
.section-title[data-section="Main"] { color: var(--main); }
.section-title[data-section="Main AI"] { color: var(--main-ai); }
.section-title[data-section="Micro AI"] { color: var(--micro); }
.section-title[data-section="Skip"] { color: var(--skip); }
.tweet { margin: 0 0 10px; color: var(--soft); }
.tweet a { color: var(--text); text-decoration: none; overflow-wrap: anywhere; }
.tweet a:hover { color: var(--accent); }
.tweet p { margin: 3px 0 0; color: var(--muted); }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px) {
  .topbar, .day-head, .hour-head, .report-head { align-items: flex-start; flex-direction: column; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

  <div class="topbar">
    <h1>Twitter Dashboard</h1>
    <div class="stamp" id="stamp"></div>
  </div>
  <section class="day-list" id="days"></section>
  <section class="detail" id="detail"></section>
</main>

<script>
const data = window.TWITTER_DASHBOARD_DATA;
let selected = data.days.find(day => day.total > 0)?.key || data.days[0]?.key;
let selectedHour = null;
const sections = data.sections;

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
}

function renderChips(counts) {
  return '<div class="chips">' + sections.map(section =>
    '<span class="chip" data-section="' + esc(section) + '">' + esc(section) + ': ' + (counts[section] || 0) + '</span>'
  ).join('') + '</div>';
}

function renderDays() {
  document.getElementById('stamp').textContent = 'Updated ' + new Date(data.generatedAt).toLocaleString();
  document.getElementById('days').innerHTML = data.days.map(day =>
    '<button class="day-card ' + (day.key === selected ? 'active' : '') + '" data-day="' + esc(day.key) + '">' +
      '<div class="day-head"><div class="day-title">' + esc(day.label) + '</div><div class="day-meta">' + day.total + ' tweets</div></div>' +
      renderChips(day.counts) +
    '</button>'
  ).join('');
}

function selectedDay() {
  return data.days.find(candidate => candidate.key === selected) || data.days[0];
}

function selectedSlot(day) {
  if (!day) return null;
  return day.slots.find(slot => String(slot.hour) === String(selectedHour)) ||
    day.slots.find(slot => slot.total > 0) ||
    day.slots[0];
}

function renderReport(items) {
  if (!items.length) return '<div class="empty">No tweets collected in this slot.</div>';
  let number = 1;
  return '<div class="report">' + sections.map(section => {
    const rows = items.filter(item => item.section === section);
    if (!rows.length) return '';
    return '<div class="section"><div class="section-title" data-section="' + esc(section) + '">' + esc(section) + '</div>' +
      rows.map(item =>
        '<div class="tweet"><a href="' + esc(item.url) + '" target="_blank" rel="noreferrer">' + (number++) + '. ' + esc(item.url) + '</a>' +
        '<p>' + esc(item.blurb) + '</p></div>'
      ).join('') + '</div>';
  }).join('') + '</div>';
}

function renderDetail() {
  const day = selectedDay();
  if (!day) return;
  const activeSlot = selectedSlot(day);
  selectedHour = activeSlot?.hour ?? null;
  document.getElementById('detail').innerHTML =
    '<div class="grid">' + day.slots.map(slot =>
      '<button class="hour-card ' + (String(slot.hour) === String(selectedHour) ? 'active' : '') + '" data-hour="' + slot.hour + '">' +
        '<div class="hour-head"><div class="hour-title">' + esc(slot.label) + '</div><div class="hour-meta">' + slot.total + '/20</div></div>' +
      '</button>'
    ).join('') + '</div>' +
    '<article class="report-panel" id="hour-report">' +
      '<div class="report-head"><div class="day-title">' + esc(day.label) + ' · ' + esc(activeSlot.label) + '</div><div class="day-meta">' + activeSlot.total + ' tweets</div></div>' +
      renderReport(activeSlot.items) +
    '</article>';
}

document.addEventListener('click', event => {
  const dayButton = event.target.closest('[data-day]');
  if (dayButton) {
    selected = dayButton.dataset.day;
    selectedHour = null;
    renderDays();
    renderDetail();
    document.getElementById('detail')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  const hourButton = event.target.closest('[data-hour]');
  if (hourButton) {
    selectedHour = hourButton.dataset.hour;
    renderDetail();
    document.getElementById('hour-report')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

renderDays();
renderDetail();
</script>
</body>
</html>
