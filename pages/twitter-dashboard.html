<title>Twitter Dashboard</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0d1117;
  --panel: #151b23;
  --panel-2: #1b2430;
  --line: #303b49;
  --text: #edf2f7;
  --muted: #9ba8b7;
  --soft: #c8d3df;
  --main: #8bd8bd;
  --main-ai: #9cc9ff;
  --micro: #d8b4fe;
  --skip: #a8b3bf;
  --accent: #f7d774;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 22px 16px 40px; }
.topbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
  margin-bottom: 18px;
}
h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
.stamp { color: var(--muted); font-size: 12px; white-space: nowrap; }
.day-list { display: grid; gap: 12px; }
.day-card, .hour-card {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
}
.day-card, .hour-card {
  width: 100%;
  color: inherit;
  text-align: left;
  cursor: pointer;
  font: inherit;
  appearance: none;
}
.day-card {
  padding: 16px;
}
.day-card:hover, .day-card.active { border-color: var(--accent); background: #192230; }
.hour-card:hover, .hour-card.active { border-color: var(--accent); background: #192230; }
.day-head, .hour-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.day-title, .hour-title { font-weight: 700; font-size: 15px; }
.day-meta, .hour-meta, .empty { color: var(--muted); font-size: 12px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { border: 1px solid var(--line); border-radius: 999px; color: var(--soft); padding: 3px 8px; font-size: 12px; }
.chip[data-section="Main"] { color: var(--main); }
.chip[data-section="Main AI"] { color: var(--main-ai); }
.chip[data-section="Micro AI"] { color: var(--micro); }
.chip[data-section="Skip"] { color: var(--skip); }
.detail { margin-top: 18px; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.hour-card { min-height: 92px; padding: 14px; }
.hour-title { font-size: 16px; }
.report-panel {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
  margin-top: 14px;
  padding: 16px;
}
.report-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
  margin-bottom: 12px;
}
.report { margin-top: 0; }
.section { margin-top: 12px; }
.section:first-child { margin-top: 0; }
.section-title { font-weight: 700; margin-bottom: 7px; }
.section-title[data-section="Main"] { color: var(--main); }
.section-title[data-section="Main AI"] { color: var(--main-ai); }
.section-title[data-section="Micro AI"] { color: var(--micro); }
.section-title[data-section="Skip"] { color: var(--skip); }
.tweet { margin: 0 0 10px; color: var(--soft); }
.tweet a { color: var(--text); text-decoration: none; overflow-wrap: anywhere; }
.tweet a:hover { color: var(--accent); }
.tweet p { margin: 3px 0 0; color: var(--muted); }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px) {
  .topbar, .day-head, .hour-head, .report-head { align-items: flex-start; flex-direction: column; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

 of new mathematics but Show more Quote Shashikant Kore @kshashi · May 10 Terence Tao - \"AI tools are like taking a helicopter to drop you off at the site. You miss all the benefits of the journey itself. You just get right to the destination, which actually was only just a part of the value of solving these problems.\" Judit Polgar - \"I always felt 1 2 17 1.2K","section":"Main AI","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/BrianCAlbrecht/status/2053802850476552476","author":"BrianCAlbrecht","blurb":"Brian Albrecht criticizes Maryland dynamic-pricing legislation after an Instacart surveillance-pricing report found no evidence. Applied pricing-policy item.","text":"Brian Albrecht @BrianCAlbrecht · 11h In December, there was a panic-inducing report about Instacart. Surveillance pricing! Okay, minor detail: they found no evidence of that. Flash forward 5 months, and we have our first law out of Maryland. Lo and behold, the law is also confused about dynamic pricing, Show more 4 38 170 10K","section":"Main","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/teortaxesTex/status/2053944895874666801","author":"teortaxesTex","blurb":"ChessBench model-comparison claim putting Gemma 4 and GPT 5.5 Pro at high chess strength. AI benchmark and model-capability signal.","text":"Teortaxes (DeepSeek 推特铁粉 2023 – ∞) @teortaxesTex · 1h > Gemma 4 is a high-level chess grandmaster > GPT 5.5 pro is close to Stockfish level 7 Quote Raphi-2Code @R2Cdev_ · 4h ChessBench is out! More models soon: 19 6 132 11K","section":"Micro AI","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/antrologos/status/2052390838005559361","author":"antrologos","blurb":"Brazil PNAD monthly-reconstruction package and paper. Skip: non-US labor-data tooling without monetary or fiscal-policy hook.","text":"André Victor Doherty Luduvice reposted Rogério J Barbosa @antrologos · May 7 2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/ernietedeschi/status/2053910468146680074","author":"ernietedeschi","blurb":"Tedeschi/Konczal exchange on US labor-share measurement, proprietors income, sectoral adjustments, depreciation, and the post-2000 decline.","text":"Ernie Tedeschi @ernietedeschi · 10m Nearly true of the Nonfinancial Corporate Business sector too, where labor/capital distinction is cleaner. Sectoral & depreciation adjustments usually raise the labor share level, & they often show flat/rising shares over 1973-2000. But post-2000 decline is pretty consistent. Quote Mike Konczal (stalked you on the internet) @mtkonczal · 1h If you assume all of proprietors' income should be classified as labor income, it's the case that the labor share is the lowest on record. (Note in the national accounts prop income was much higher as a % of national income in the 1950s-1960s.) x.com/mattyglesias/s… 2 2 778","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/apsrjournal/status/2053187502119293339","author":"apsrjournal","blurb":"APSR article on case translation and generalization in political science. Skip: political-science methods rather than economics research or AI.","text":"Jacob Edenhofer reposted American Political Science Review @apsrjournal · May 9 From our February Issue: How Cases Speak to One Another: Using Translation to Rethink Generalization in Political Science Research by ERICA S. SIMMONS and NICHOLAS RUSH SMITH. https:// doi.org/10.1017/S00030 55425000140 … 9 34 3.2K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/Brad_Setser/status/2053841207160103306","author":"Brad_Setser","blurb":"Setser evaluates yuan undervaluation using IMF current-account modeling and Goldman's dollar/yuan estimate. International macro and exchange-rate policy signal.","text":"Brad Setser @Brad_Setser · 4h With a realistic current account surplus number (one that takes out the 22 downward adjustment in the goods surplus and uses a realistic estimate of the income balance), the IMF's model would suggest a 25-30% undervaluation Quote Bloomberg @business · 17h The Chinese yuan is more than 20% undervalued against the US dollar, according to Goldman Sachs, which expects the currency to keep strengthening over the coming year https:// bloomberg.com/news/articles/ 2026-05-11/goldman-says-yuan-20-undervalued-boosts-currency-forecasts?taid=6a012fc9999f620001574468&utm_campaign=trueanthem&utm_content=business&utm_medium=social&utm_source=twitter … 4 5 38 8.1K","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/ptuomov/status/2053866846848176342","author":"ptuomov","blurb":"Portfolio-diversification argument about adding cheap ETF asset classes to a US 60/40 baseline. Skip: investment advice debate rather than economics research or policy.","text":"Ptuomov @ptuomov · 3h I think it's self evident that if you start from 60% US equity and 40% US Treasuries and add asset classes that are available as cheap index ETFs, you can construct a portfolio that has a higher out-of-sample Sharpe ratio than US 60/40 in expectation. Such asset classes Show more Quote Rick Ferri, CFA @Rick_Ferri · 6h There’s belief among advisers that adding asset classes with low correlation increases return without adding risk. That portfolio benefit is extremely difficult to forecast and can be costly to implement. It’s best not expect a benefit. Great if it happens, but don’t count on it! 3 26 3.1K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/SFGaliani/status/2053435453764776057","author":"SFGaliani","blurb":"Galiani anecdote about Borges, universities, and intellectual life. Skip: humanities/profession reflection without economics content.","text":"Sebastian Galiani @SFGaliani · May 10 Befor ices. Central-bank transmission research on whether policy can influence energy prices.","text":"International and Monetary Economics Network reposted International and Monetary Economics Network @int_mon_econ · 8h Highly relevant! \"Friend, Not Foe? Monetary Policy and Energy Prices\" by Gökhan Ider, Alexander Kriwoluzky, Frederik Kurcz, and Ben Schumann. \"A central bank’s ability to influence energy prices fundamentally shapes both monetary policy transmission and mandate-optimal policy Show more 9 39 1.4K","section":"Main","seenAt":"2026-05-11 16:01:04","source":"collector:2026-05-11-170022:always-look:int_mon_econ"},{"url":"https://x.com/MiriVinni/status/2053482063655796829","author":"MiriVinni","blurb":"Housing-supply discourse about new apartments and rent perceptions. Skip: timeline argument without a research, macro, or policy object.","text":"Miri Vinni @MiriVinni · May 10 They see a new apartment building go up, look at the price of rent, and say “this isn’t affordable housing.” That’s literally all it is. This is how most people look at the issue. Quote evan conrad @evanjconrad · May 9 genuinely im so confused how people still can believe that restricting new housing creation would decrease rent no explanation ever seems to be given, its like watching someone say we should feed the poor by lighting fire to the farms x.com/PramilaJayapal… 5 9 324 8.4K","section":"Skip","seenAt":"2026-05-11 16:01:04","source":"collector:2026-05-11-160019"},{"url":"https://x.com/michael_wiebe/status/2053866304403276191","author":"michael_wiebe","blurb":"Left-NIMBY housing-displacement argument from Michael Wiebe. Skip: housing discourse without a specific research or policy hook.","text":"Michael Wiebe @michael_wiebe · 4h Quote Michael Wiebe @michael_wiebe · May 3 Left-NIMBYs think that blocking new apartments stops gentrification. What actually happens: new demand is redirected to the existing housing stock. Instead of living in new apartments, rich newcomers buy up old ho <script>
const data = window.TWITTER_DASHBOARD_DATA;
let selected = data.days.find(day => day.total > 0)?.key || data.days[0]?.key;
let selectedHour = null;
const sections = data.sections;

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
}

function renderChips(counts) {
  return '<div class="chips">' + sections.map(section =>
    '<span class="chip" data-section="' + esc(section) + '">' + esc(section) + ': ' + (counts[section] || 0) + '</span>'
  ).join('') + '</div>';
}

function renderDays() {
  document.getElementById('stamp').textContent = 'Updated ' + new Date(data.generatedAt).toLocaleString();
  document.getElementById('days').innerHTML = data.days.map(day =>
    '<button class="day-card ' + (day.key === selected ? 'active' : '') + '" data-day="' + esc(day.key) + '">' +
      '<div class="day-head"><div class="day-title">' + esc(day.label) + '</div><div class="day-meta">' + day.total + ' tweets</div></div>' +
      renderChips(day.counts) +
    '</button>'
  ).join('');
}

function selectedDay() {
  return data.days.find(candidate => candidate.key === selected) || data.days[0];
}

function selectedSlot(day) {
  if (!day) return null;
  return day.slots.find(slot => String(slot.hour) === String(selectedHour)) ||
    day.slots.find(slot => slot.total > 0) ||
    day.slots[0];
}

function renderReport(items) {
  if (!items.length) return '<div class="empty">No tweets collected in this slot.</div>';
  let number = 1;
  return '<div class="report">' + sections.map(section => {
    const rows = items.filter(item => item.section === section);
    if (!rows.length) return '';
    return '<div class="section"><div class="section-title" data-section="' + esc(section) + '">' + esc(section) + '</div>' +
      rows.map(item =>
        '<div class="tweet"><a href="' + esc(item.url) + '" target="_blank" rel="noreferrer">' + (number++) + '. ' + esc(item.url) + '</a>' +
        '<p>' + esc(item.blurb) + '</p></div>'
      ).join('') + '</div>';
  }).join('') + '</div>';
}

function renderDetail() {
  const day = selectedDay();
  if (!day) return;
  const activeSlot = selectedSlot(day);
  selectedHour = activeSlot?.hour ?? null;
  document.getElementById('detail').innerHTML =
    '<div class="grid">' + day.slots.map(slot =>
      '<button class="hour-card ' + (String(slot.hour) === String(selectedHour) ? 'active' : '') + '" data-hour="' + slot.hour + '">' +
        '<div class="hour-head"><div class="hour-title">' + esc(slot.label) + '</div><div class="hour-meta">' + slot.total + '/20</div></div>' +
      '</button>'
    ).join('') + '</div>' +
    '<article class="report-panel" id="hour-report">' +
      '<div class="report-head"><div class="day-title">' + esc(day.label) + ' · ' + esc(activeSlot.label) + '</div><div class="day-meta">' + activeSlot.total + ' tweets</div></div>' +
      renderReport(activeSlot.items) +
    '</article>';
}

document.addEventListener('click', event => {
  const dayButton = event.target.closest('[data-day]');
  if (dayButton) {
    selected = dayButton.dataset.day;
    selectedHour = null;
    renderDays();
    renderDetail();
    document.getElementById('detail')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  const hourButton = event.target.closest('[data-hour]');
  if (hourButton) {
    selectedHour = hourButton.dataset.hour;
    renderDetail();
    document.getElementById('hour-report')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

renderDays();
renderDetail();
</script>
