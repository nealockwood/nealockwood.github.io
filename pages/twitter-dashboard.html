<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twitter Dashboard</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0d1117;
  --panel: #151b23;
  --panel-2: #1b2430;
  --line: #303b49;
  --text: #edf2f7;
  --muted: #9ba8b7;
  --soft: #c8d3df;
  --main: #8bd8bd;
  --main-ai: #9cc9ff;
  --micro: #d8b4fe;
  --skip: #a8b3bf;
  --accent: #f7d774;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 22px 16px 40px; }
.topbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
  margin-bottom: 18px;
}
h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
.stamp { color: var(--muted); font-size: 12px; white-space: nowrap; }
.day-list { display: grid; gap: 12px; }
.day-card, .hour-card {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
}
.day-card, .hour-card {
  width: 100%;
  color: inherit;
  text-align: left;
  cursor: pointer;
  font: inherit;
  appearance: none;
}
.day-card {
  padding: 16px;
}
.day-card:hover, .day-card.active { border-color: var(--accent); background: #192230; }
.hour-card:hover, .hour-card.active { border-color: var(--accent); background: #192230; }
.day-head, .hour-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.day-title, .hour-title { font-weight: 700; font-size: 15px; }
.day-meta, .hour-meta, .empty { color: var(--muted); font-size: 12px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { border: 1px solid var(--line); border-radius: 999px; color: var(--soft); padding: 3px 8px; font-size: 12px; }
.chip[data-section="Main"] { color: var(--main); }
.chip[data-section="Main AI"] { color: var(--main-ai); }
.chip[data-section="Micro AI"] { color: var(--micro); }
.chip[data-section="Skip"] { color: var(--skip); }
.detail { margin-top: 18px; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.hour-card { min-height: 92px; padding: 14px; }
.hour-title { font-size: 16px; }
.report-panel {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
  margin-top: 14px;
  padding: 16px;
}
.report-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
  margin-bottom: 12px;
}
.report { margin-top: 0; }
.section { margin-top: 12px; }
.section:first-child { margin-top: 0; }
.section-title { font-weight: 700; margin-bottom: 7px; }
.section-title[data-section="Main"] { color: var(--main); }
.section-title[data-section="Main AI"] { color: var(--main-ai); }
.section-title[data-section="Micro AI"] { color: var(--micro); }
.section-title[data-section="Skip"] { color: var(--skip); }
.tweet { margin: 0 0 10px; color: var(--soft); }
.tweet a { color: var(--text); text-decoration: none; overflow-wrap: anywhere; }
.tweet a:hover { color: var(--accent); }
.tweet p { margin: 3px 0 0; color: var(--muted); }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px) {
  .topbar, .day-head, .hour-head, .report-head { align-items: flex-start; flex-direction: column; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

</main>

ical truth. Skip: philosophy-of-math discourse with weak economics or AI-policy signal.","text":"David Bessis @davidbessis · 11h There is a reason why all mathematicians would benefit from reading the later Wittgenstein. Quote Acer @AcerFur · May 2 Replying to @hakunamakunana and @0ranguchad The reason I do math is because I want to know what is true and understand why that’s the case, and it doesn’t matter to me whether that comes from a human or a machine. You are right that problems being solved spawns more problems, but those new problems are often much deeper! 9 7 121 13K","section":"Skip","seenAt":"2026-05-12 20:02:24","source":"collector:2026-05-12-160020"},{"url":"https://x.com/Noahpinion/status/2054256913286828177","author":"Noahpinion","blurb":"Noah Smith and Ivan Werning discuss whether AI could reduce scientific output through undetectable fraud. Big-picture AI effect on science.","text":"Noah Smith @Noahpinion · 2h I don't think music is a good analogy here, since it's a matter of taste (if people want to hear auto-tune, me saying it's \"bad\" is just me saying I have esoteric tastes). But yes, AI could conceivably make science worse, via undetectable fraud. Quote Ivan Werning @IvanWerning · 9h AI: employment concerns aside, can it have negative effects on output, say, in science? Or is a new tool necessarily a boost? One concerning analogy: music was MUCH WORSE with the arrival of latest digital tools (auto-tune, pro-tools, etc). 4 1 16 6.9K THREAD_REPLY Ivan Werning @IvanWerning · 46m Fair, I knew it would be controversial and it goes against my alma mater of \"De Gustibus Non…\" but it is still TRUE in some statistically objective polled way I think! 180","section":"Main AI","seenAt":"2026-05-12 20:02:24","source":"collector:2026-05-12-160020"},{"url":"https://x.com/dhhzheng/status/2054113657655533618","author":"dhhzheng","blurb":"Marc Lackenby finite-group preprint credits significant help from an AI co-mathematician. Concrete AI-for-mathematics res l open Erdos problems I've learned a lot of new mathematics but Show more Quote Shashikant Kore @kshashi · May 10 Terence Tao - \"AI tools are like taking a helicopter to drop you off at the site. You miss all the benefits of the journey itself. You just get right to the destination, which actually was only just a part of the value of solving these problems.\" Judit Polgar - \"I always felt 1 2 17 1.2K","section":"Main AI","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/BrianCAlbrecht/status/2053802850476552476","author":"BrianCAlbrecht","blurb":"Brian Albrecht criticizes Maryland dynamic-pricing legislation after an Instacart surveillance-pricing report found no evidence. Applied pricing-policy item.","text":"Brian Albrecht @BrianCAlbrecht · 11h In December, there was a panic-inducing report about Instacart. Surveillance pricing! Okay, minor detail: they found no evidence of that. Flash forward 5 months, and we have our first law out of Maryland. Lo and behold, the law is also confused about dynamic pricing, Show more 4 38 170 10K","section":"Main","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/teortaxesTex/status/2053944895874666801","author":"teortaxesTex","blurb":"ChessBench model-comparison claim putting Gemma 4 and GPT 5.5 Pro at high chess strength. AI benchmark and model-capability signal.","text":"Teortaxes (DeepSeek 推特铁粉 2023 – ∞) @teortaxesTex · 1h > Gemma 4 is a high-level chess grandmaster > GPT 5.5 pro is close to Stockfish level 7 Quote Raphi-2Code @R2Cdev_ · 4h ChessBench is out! More models soon: 19 6 132 11K","section":"Micro AI","seenAt":"2026-05-11 23:01:01","source":"collector:2026-05-11-190018"},{"url":"https://x.com/antrologos/status/2052390838005559361","author":"antrologos","blurb":"Brazil PNAD monthly-reconstruction package and paper. Skip: non-US labor-data tooling without monetary or fiscal-policy hook.","text":"André Victor Doherty Luduvice reposte com/AlecStapp/stat… 9 5 36 1.6K THREAD_REPLY Ethan Mollick @emollick · 55m One of the most important properties of LLMs that we take for granted is that newer, bigger models are just better at everything. The AI Labs are pouring effort into economically valuable fields like coding, but bigger models are also better at negotiation, alignment, poetry, etc Quote Lech Mazur @LechMazur · 1h First update to PACT, my head-to-head LLM negotiation benchmark! 20-round buyer-seller bargaining game: each round the AIs can message, the buyer submits a bid and the seller submits an ask. If bid ≥ ask, trade clears at the midpoint. Thousands of matchups! GPT-5.5 is #1 14 10 110 9.1K","section":"Main AI","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/DaveEvansPhD/status/2053900485791285473","author":"DaveEvansPhD","blurb":"Development-economics panel with Duflo, Glennerster, Kremer, Robinson, and Samantha Power on economists and evidence in international development.","text":"David Evans @DaveEvansPhD · 50m What is the role of economists and of evidence in international development efforts? Esther Duflo, @RGlenner ( @CGDev ), Michael Kremer, James Robinson, and Samantha Power discuss this topic between 2:27:30 & 2:59:28 on this video: https:// youtu.be/u3zEJFhmuSQ?si =noVNjx_ac8WLZv5X&t=8849 …. 1 6 25 1.3K","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/soumitrashukla9/status/2053906600704761966","author":"soumitrashukla9","blurb":"Waymo safety quote framed as politicians blocking technology. Skip: autonomous-vehicle politics without a concrete AI-economics or economics-research hook.","text":"Soumitra Shukla @soumitrashukla9 · 25m I really hope our politicians don’t get in the way of this revolutionary technology Quote Dmitri Dolgov @dmitri_dolgov · Jun 18, 2024 Empirical data from ~15M RO miles shows the @Waymo Driver is better at avoiding crashes than human drivers where w at piece of garbage they sent us... It's on life support.\"","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/iaindunning/status/2053890059561017516","author":"iaindunning","blurb":"Hudson River Trading revenue story used for a hiring quip. Skip: finance-company news without macro, research, or AI-industry relevance.","text":"Iain Dunning @iaindunning · 1h Hiring! Quote Bloomberg @business · 2h Hudson River Trading posted a record $6.4 billion of trading revenue in the first quarter, more than half of its total haul in all of 2025. https:// bloomberg.com/news/articles/ 2026-05-11/hudson-river-trading-notches-record-6-4-billion-quarterly-markets-haul?taid=6a020755717bd400015ef76c&utm_campaign=trueanthem&utm_content=business&utm_medium=social&utm_source=twitter … 16 6 272 41K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/arpitrage/status/2053874591160766830","author":"arpitrage","blurb":"Moderna stock move attributed to hantavirus. Skip: isolated market chatter without a broader economics, policy, or research claim.","text":"Arpit Gupta @arpitrage · 2h Moderna stock up 15% last five days because of hantavirus 5 1K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/captgouda24/status/2053903332696007149","author":"captgouda24","blurb":"Vincent Rollet job-market paper on upzoning and redevelopment constraints. Housing economics research with a clear paper-specific claim.","text":"Nicholas Decker @captgouda24 · 39m Looking back, this might be the best job market I've ever seen. Quote Nicholas Decker @captgouda24 · Sep 29, 2025 Fantastic job market paper from @vincent_rollet. Highlights key problem for upzoning — what can be built is shaped by the past. You need to demolish the small before you can build the large. This revises down the gains from upzoning, which accrue mainly to movers. 1/ 2 10 1.2K","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/ernietedeschi/status/2053910468146680074","author":"ernietedeschi","blurb":"Tedeschi/Konczal exchange on US labor-share measurement, proprietors income, sectoral adjustments, depreciation, and the post-2000 decline.","text":"Ernie Tedeschi @ernietedeschi · 10m Nearly true of the Nonfinancial Corporate Business sector too, where labor/capital distinction is cleaner. Sectoral & depreciation adjustments usually raise the labor share level, & they often show flat/rising shares over 1973-2000. But post-2000 decline is pretty consistent. Quote Mike Konczal (stalked you on the internet) @mtkonczal · 1h If you assume all of proprietors' income should be classified as labor income, it's the case that the labor share is the lowest on record. (Note in the national accounts prop income was much higher as a % of national income in the 1950s-1960s.) x.com/mattyglesias/s… 2 2 778","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/apsrjournal/status/2053187502119293339","author":"apsrjournal","blurb":"APSR article on case translation and generalization in political science. Skip: political-science methods rather than economics research or AI.","text":"Jacob Edenhofer reposted American Political Science Review @apsrjournal · May 9 From our February Issue: How Cases Speak to One Another: Using Translation to Rethink Generalization in Political Science Research by ERICA S. SIMMONS and NICHOLAS RUSH SMITH. https:// doi.org/10.1017/S00030 55425000140 … 9 34 3.2K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/Brad_Setser/status/2053841207160103306","author":"Brad_Setser","blurb":"Setser evaluates yuan undervaluation using IMF current-account modeling and Goldman's dollar/yuan estimate. International macro and exchange-rate policy signal.","text" astian Galiani @SFGaliani · May 10 Before universities were filled with academics, they were inhabited by intellectuals. Borges, for example, recalled that after finishing the class he taught on Argentine literature, he would often attend, as a listener, another one on Saxon poetry taught by Dr. Willard. “My days Show more 9 20 392 30K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/PhillipsPOBrien/status/2053158552139596253","author":"PhillipsPOBrien","blurb":"NATO and US weapons-sales critique. Skip: political and foreign-policy commentary outside the economics/AI rubric.","text":"Fabio Ghironi reposted Phillips P. OBrien @PhillipsPOBrien · May 9 The US is so full of BS about NATO. For all the bluster, the Trump admin will never leave the alliance because they want to sell weapons to Europe, do not want Europe to build up its own strategic industries, want influence over European policy, and want to help Putin. Quote U.S. Ambassador to NATO @USAmbNATO · May 9 This week's USNATO Huddle is on NATO 3.0. The era of America footing an outsized bill for Europe’s defense has ended. Led by President Trump’s America First Foreign Policy, the United States demands actions, not words, from our Allies. 48 214 744 40K","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/njtmulder/status/2053884882657464812","author":"njtmulder","blurb":"Mulder forthcoming IMF Finance & Development piece on nationalization in the 2020s, tied to price controls, financial repression, and fiscal-monetary coordination.","text":"Nicholas Mulder @njtmulder · 1h I have a piece forthcoming in the summer issue of the IMF’s Finance & Development about the return of nationalization in the 2020s and what this new wave amounts to. Quote Adam Tooze @adam_tooze · 3h Price controls Nationalization Financial repression Fiscal-monetary coordination @GitaGopinath warns that all four of these policies might form a heterodox response to our current situation of high economic tension. 1 7 594","section":"Main","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"},{"url":"https://x.com/MatthewCDean/status/2053897032356524335","author":"MatthewCDean","blurb":"Richard Velkley book praise. Skip: low-context intellectual-history note without economics research, policy, or AI signal.","text":"Matthew C Dean @MatthewCDean · 1h Richard Velkley's \"Rules for the Misdirection of the Mind\" is a true delight. 6 17 984","section":"Skip","seenAt":"2026-05-11 19:01:10","source":"collector:2026-05-11-150019"}]},{"hour":14,"label":"2pm EST","counts":{"Main":7,"Main AI":2,"Micro AI":1,"Skip":8},"total":18,"items":[{"url":"https://x.com/sobel_mark/status/2053814671350583562","author":"sobel_mark","blurb":"Setser/Sobel yuan note uses IMF current-account valuation models to argue the RMB is materially undervalued. International monetary and exchange-rate policy signal.","text":"Brad Setser reposted Mark Sobel @sobel_mark · 8h Don't get excited about higher fix. Very small beer. Some data points. IMF valuation models. With Chinese CA norm of 0.8% GDP & 2025 surplus of 3.7% GDP, RMB 20% undervalued. Customs/income data could suggest much higher surplus. See, Sobel/Setser https:// omfif.org/2025/11/its-ti me-for-china-to-let-the-renminbi-appreciate-sharply/ … Quote Financial Times @FT · 17h China fixes currency at 3-year high ahead of Trump-Xi meeting https:// ft.trib.al/uyqKIud 2 7 17 11K","section":"Main","seenAt":"2026-05-11 18:01:27","source":"collector:2026-05-11-170022"},{"url":"https://x.com/ONS/status/2052758614272516142","author":"ONS","blurb":"ONS Standard Occupational Classification consultation deadline. Skip: UK statistical-administration notice without U.S., monetary, or fiscal relevance.","text":"Grant Fitzner reposted Office for National Statistics (ONS) @ONS · May 8 The Standard Occupational Classification 2020 (SOC) revision consultation is closi <script>
const data = window.TWITTER_DASHBOARD_DATA;
let selected = data.days.find(day => day.total > 0)?.key || data.days[0]?.key;
let selectedHour = null;
const sections = data.sections;

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
}

function renderChips(counts) {
  return '<div class="chips">' + sections.map(section =>
    '<span class="chip" data-section="' + esc(section) + '">' + esc(section) + ': ' + (counts[section] || 0) + '</span>'
  ).join('') + '</div>';
}

function renderDays() {
  document.getElementById('stamp').textContent = 'Updated ' + new Date(data.generatedAt).toLocaleString();
  document.getElementById('days').innerHTML = data.days.map(day =>
    '<button class="day-card ' + (day.key === selected ? 'active' : '') + '" data-day="' + esc(day.key) + '">' +
      '<div class="day-head"><div class="day-title">' + esc(day.label) + '</div><div class="day-meta">' + day.total + ' tweets</div></div>' +
      renderChips(day.counts) +
    '</button>'
  ).join('');
}

function selectedDay() {
  return data.days.find(candidate => candidate.key === selected) || data.days[0];
}

function selectedSlot(day) {
  if (!day) return null;
  return day.slots.find(slot => String(slot.hour) === String(selectedHour)) ||
    day.slots.find(slot => slot.total > 0) ||
    day.slots[0];
}

function renderReport(items) {
  if (!items.length) return '<div class="empty">No tweets collected in this slot.</div>';
  let number = 1;
  return '<div class="report">' + sections.map(section => {
    const rows = items.filter(item => item.section === section);
    if (!rows.length) return '';
    return '<div class="section"><div class="section-title" data-section="' + esc(section) + '">' + esc(section) + '</div>' +
      rows.map(item =>
        '<div class="tweet"><a href="' + esc(item.url) + '" target="_blank" rel="noreferrer">' + (number++) + '. ' + esc(item.url) + '</a>' +
        '<p>' + esc(item.blurb) + '</p></div>'
      ).join('') + '</div>';
  }).join('') + '</div>';
}

function renderDetail() {
  const day = selectedDay();
  if (!day) return;
  const activeSlot = selectedSlot(day);
  selectedHour = activeSlot?.hour ?? null;
  document.getElementById('detail').innerHTML =
    '<div class="grid">' + day.slots.map(slot =>
      '<button class="hour-card ' + (String(slot.hour) === String(selectedHour) ? 'active' : '') + '" data-hour="' + slot.hour + '">' +
        '<div class="hour-head"><div class="hour-title">' + esc(slot.label) + '</div><div class="hour-meta">' + slot.total + '/20</div></div>' +
      '</button>'
    ).join('') + '</div>' +
    '<article class="report-panel" id="hour-report">' +
      '<div class="report-head"><div class="day-title">' + esc(day.label) + ' · ' + esc(activeSlot.label) + '</div><div class="day-meta">' + activeSlot.total + ' tweets</div></div>' +
      renderReport(activeSlot.items) +
    '</article>';
}

document.addEventListener('click', event => {
  const dayButton = event.target.closest('[data-day]');
  if (dayButton) {
    selected = dayButton.dataset.day;
    selectedHour = null;
    renderDays();
    renderDetail();
    document.getElementById('detail')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  const hourButton = event.target.closest('[data-hour]');
  if (hourButton) {
    selectedHour = hourButton.dataset.hour;
    renderDetail();
    document.getElementById('hour-report')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

renderDays();
renderDetail();
</script>
